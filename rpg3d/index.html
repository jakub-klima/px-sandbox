<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hrdina meče 3D – jednoduché RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #0d1320;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }
    body { display: flex; flex-direction: column; }
    #game { flex: 1 1 auto; width: 100%; min-height: 0; display: block; }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.7);
    }
    #hud .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    #hud .label { font-size: 13px; width: 56px; opacity: .85; }
    .bar { width: 180px; height: 14px; border-radius: 7px; background: rgba(255,255,255,.15); overflow: hidden; }
    .bar > span { display: block; height: 100%; width: 100%; transition: width .15s ease; }
    #hpBar > span { background: linear-gradient(90deg, #ff5b5b, #ff8a3d); }
    #score {
      position: fixed; top: 12px; right: 14px;
      color: #fff; font-size: 16px; font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,.7); pointer-events: none;
    }

    /* Vinětace pro filmovější vzhled */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 4;
      background: radial-gradient(ellipse at 50% 45%, rgba(0,0,0,0) 52%, rgba(0,0,0,.5) 100%);
    }

    /* Plovoucí čísla poškození */
    #floaters { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 5; }
    .dmg {
      position: absolute; transform: translate(-50%, -50%);
      font-weight: 800; font-size: 20px; white-space: nowrap;
      text-shadow: 0 2px 4px rgba(0,0,0,.8), 0 0 2px rgba(0,0,0,.9);
      will-change: transform, opacity;
    }
    .dmg.deal { color: #fff2a0; }
    .dmg.crit { color: #ffd23d; font-size: 28px; }
    .dmg.take { color: #ff6b6b; }

    #hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      color: #cfe0ff; font-size: 13px; text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,.7); pointer-events: none;
      line-height: 1.5;
    }

    /* Mobilní ovládání */
    #touch { position: fixed; inset: 0; pointer-events: none; }
    #stick {
      position: absolute; left: 22px; bottom: 22px;
      width: 130px; height: 130px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.18);
      pointer-events: auto; touch-action: none;
    }
    #knob {
      position: absolute; left: 50%; top: 50%; width: 56px; height: 56px;
      margin: -28px 0 0 -28px; border-radius: 50%;
      background: rgba(255,255,255,.35); border: 2px solid rgba(255,255,255,.5);
    }
    #attackBtn {
      position: absolute; right: 26px; bottom: 40px;
      width: 92px; height: 92px; border-radius: 50%;
      background: rgba(255,120,80,.35); border: 2px solid rgba(255,160,120,.6);
      color: #fff; font-size: 30px; display: flex; align-items: center; justify-content: center;
      pointer-events: auto; touch-action: none;
    }
    #attackBtn:active { background: rgba(255,120,80,.6); }
    @media (hover: hover) and (pointer: fine) { #touch { display: none; } }

    #overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(8,12,22,.82); color: #fff; text-align: center; z-index: 10;
    }
    #overlay.hidden { display: none; }
    #overlay .panel { max-width: 360px; padding: 24px; }
    #overlay h1 { font-size: 26px; margin-bottom: 10px; }
    #overlay p { opacity: .85; font-size: 14px; line-height: 1.6; margin-bottom: 18px; }
    #overlay button {
      display: block; width: 100%; margin: 0 auto 10px;
      font-size: 16px; padding: 12px 26px; border: none; border-radius: 10px;
      background: linear-gradient(90deg, #ff7a3d, #ff5b8a); color: #fff; cursor: pointer;
      font-weight: 600;
    }
    #overlay button:active { transform: scale(.97); }
    #ovFsBtn {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.3) !important;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="vignette"></div>
  <div id="floaters"></div>

  <div id="hud">
    <div class="row">
      <span class="label">❤️ Život</span>
      <div class="bar" id="hpBar"><span></span></div>
    </div>
  </div>
  <div id="score">⚔️ Skóre: 0</div>
  <div id="hint">WASD / šipky = chůze · mezerník nebo klik = útok mečem</div>

  <div id="touch">
    <div id="stick"><div id="knob"></div></div>
    <div id="attackBtn">⚔️</div>
  </div>

  <div id="overlay" class="hidden">
    <div class="panel">
      <h1 id="ovTitle">Hrdina meče</h1>
      <p id="ovText">Poraz co nejvíce příšer!</p>
      <button id="ovBtn">Hrát</button>
      <button id="ovFsBtn">📱 Hrát na celou obrazovku</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from 'three';

  // ---------- Základní nastavení scény ----------
  const canvas = document.getElementById('game');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;

  const SKY_TOP = 0x2a3c63, SKY_BOT = 0x9bb4d6, FOG_COL = 0x7d93b8;
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(FOG_COL, 34, 78);

  // Obloha jako svislý přechod (canvas textura)
  (function makeSky() {
    const c = document.createElement('canvas'); c.width = 4; c.height = 256;
    const g = c.getContext('2d').createLinearGradient(0, 0, 0, 256);
    g.addColorStop(0, '#3a5081'); g.addColorStop(0.5, '#6f8cba'); g.addColorStop(1, '#b9cbe4');
    const ctx = c.getContext('2d'); ctx.fillStyle = g; ctx.fillRect(0, 0, 4, 256);
    const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
    const sky = new THREE.Mesh(
      new THREE.SphereGeometry(140, 16, 16),
      new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide, fog: false })
    );
    scene.add(sky);
  })();

  const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 320);
  // Pevná kamera ve stylu Diablo – vysoko a daleko, pod strmým úhlem.
  const CAM_HEIGHT = 15;  // výška nad hrdinou
  const CAM_BACK = 11;    // odsazení směrem k divákovi (+z)
  camera.position.set(0, CAM_HEIGHT, CAM_BACK);
  camera.lookAt(0, 0.5, 0);

  // Světla – teplé slunce + chladné nebe + jemné dosvícení
  scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x3a4030, 0.7));
  const sun = new THREE.DirectionalLight(0xfff1d6, 2.0);
  sun.position.set(20, 34, 14);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 100;
  sun.shadow.bias = -0.0004;
  sun.shadow.normalBias = 0.02;
  const s = 46;
  sun.shadow.camera.left = -s; sun.shadow.camera.right = s;
  sun.shadow.camera.top = s; sun.shadow.camera.bottom = -s;
  scene.add(sun);
  // chladné dosvícení zezadu pro objem
  const fill = new THREE.DirectionalLight(0x6f8cc0, 0.5);
  fill.position.set(-16, 12, -18);
  scene.add(fill);

  // Procedurální environment mapa z oblohy → realistické odlesky na kovu
  try {
    const pmrem = new THREE.PMREMGenerator(renderer);
    pmrem.compileEquirectangularShader();
    scene.environment = pmrem.fromScene(scene, 0, 0.1, 300).texture;
  } catch (e) { /* bez env mapy to běží taky */ }

  // ---------- Aréna ----------
  const ARENA = 38; // poloměr herní plochy (čtverec)

  // Pomocník: mesh s vrženými/přijímanými stíny
  function solid(geo, mat) {
    const m = new THREE.Mesh(geo, mat);
    m.castShadow = true; m.receiveShadow = true;
    return m;
  }
  function box(w, h, d, mat) { return solid(new THREE.BoxGeometry(w, h, d), mat); }

  // Organická šumová textura (tráva / kámen) – plynulé skvrny
  function noiseTexture(size, blobs, baseRGB, varRGB, repeat, darkSpots) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = `rgb(${baseRGB[0]},${baseRGB[1]},${baseRGB[2]})`;
    ctx.fillRect(0, 0, size, size);
    for (let i = 0; i < blobs; i++) {
      const r = 2 + Math.random() * (size / 12);
      const k = Math.random() * 2 - 1;
      const cr = Math.max(0, Math.min(255, baseRGB[0] + varRGB[0] * k + (Math.random() * 2 - 1) * 10));
      const cg = Math.max(0, Math.min(255, baseRGB[1] + varRGB[1] * k + (Math.random() * 2 - 1) * 10));
      const cb = Math.max(0, Math.min(255, baseRGB[2] + varRGB[2] * k + (Math.random() * 2 - 1) * 10));
      ctx.fillStyle = `rgba(${cr | 0},${cg | 0},${cb | 0},${0.25 + Math.random() * 0.35})`;
      ctx.beginPath();
      ctx.arc(Math.random() * size, Math.random() * size, r, 0, Math.PI * 2);
      ctx.fill();
    }
    if (darkSpots) for (let i = 0; i < darkSpots; i++) {
      ctx.fillStyle = `rgba(50,40,28,${0.10 + Math.random() * 0.18})`;
      ctx.beginPath();
      ctx.arc(Math.random() * size, Math.random() * size, 4 + Math.random() * 14, 0, Math.PI * 2);
      ctx.fill();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.anisotropy = 8;
    if (repeat) tex.repeat.set(repeat, repeat);
    return tex;
  }

  // ---------- Země ----------
  const grassTex = noiseTexture(512, 4500, [60, 96, 52], [26, 34, 22], 9, 220);
  const grassBump = grassTex.clone(); grassBump.needsUpdate = true;
  const groundMat = new THREE.MeshStandardMaterial({
    map: grassTex, bumpMap: grassBump, bumpScale: 0.25, roughness: 0.95, metalness: 0
  });
  const ground = new THREE.Mesh(new THREE.BoxGeometry(ARENA * 2, 1, ARENA * 2), groundMat);
  ground.position.y = -0.5; ground.receiveShadow = true;
  scene.add(ground);

  // ---------- Hradby + věže ----------
  const stoneTex = noiseTexture(256, 1400, [120, 124, 132], [34, 32, 30], 1, 0);
  const wallMat = new THREE.MeshStandardMaterial({ map: stoneTex, bumpMap: stoneTex, bumpScale: 0.4, roughness: 0.9, metalness: 0.05 });
  const battlementMat = new THREE.MeshStandardMaterial({ color: 0x9298a6, roughness: 0.9, metalness: 0.05 });
  function addWall(x, z, w, d, horizontal) {
    const wall = solid(new THREE.BoxGeometry(w, 3.4, d), wallMat);
    wall.position.set(x, 1.7, z);
    scene.add(wall);
    const len = horizontal ? w : d;
    const count = Math.floor(len / 2.4);
    for (let i = 0; i < count; i++) {
      const t = (i + 0.5) / count - 0.5;
      const bx = horizontal ? x + t * len : x;
      const bz = horizontal ? z : z + t * len;
      const cap = box(horizontal ? 1.1 : 1.5, 0.7, horizontal ? 1.5 : 1.1, battlementMat);
      cap.position.set(bx, 3.6, bz);
      scene.add(cap);
    }
  }
  addWall(0, -ARENA, ARENA * 2, 1.3, true);
  addWall(0, ARENA, ARENA * 2, 1.3, true);
  addWall(-ARENA, 0, 1.3, ARENA * 2, false);
  addWall(ARENA, 0, 1.3, ARENA * 2, false);
  // kulaté rohové věže s kuželovou střechou
  const towerMat = new THREE.MeshStandardMaterial({ map: stoneTex, bumpMap: stoneTex, bumpScale: 0.4, roughness: 0.9 });
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x7d3b3b, roughness: 0.7, metalness: 0.1 });
  for (const sx of [-1, 1]) for (const sz of [-1, 1]) {
    const tw = solid(new THREE.CylinderGeometry(2.1, 2.4, 7, 16), towerMat);
    tw.position.set(sx * ARENA, 3.5, sz * ARENA); scene.add(tw);
    const roof = solid(new THREE.ConeGeometry(2.7, 3, 16), roofMat);
    roof.position.set(sx * ARENA, 8.5, sz * ARENA); scene.add(roof);
  }

  // ---------- Dekorace: stromy, skály, pochodně ----------
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x6b4828, roughness: 0.95 });
  const leafMats = [0x2f6b32, 0x3a7d3e, 0x27592c, 0x4f8c3a].map(c =>
    new THREE.MeshStandardMaterial({ color: c, roughness: 0.85, flatShading: true }));
  const rockMat = new THREE.MeshStandardMaterial({ color: 0x787c86, roughness: 0.9, metalness: 0.05, flatShading: true });

  // jehličnatý / kulatý strom
  function addTree(x, z) {
    const g = new THREE.Group();
    const h = 1.8 + Math.random() * 1.4;
    const trunk = solid(new THREE.CylinderGeometry(0.18, 0.32, h, 8), trunkMat);
    trunk.position.y = h / 2; g.add(trunk);
    const lm = leafMats[(Math.random() * leafMats.length) | 0];
    if (Math.random() < 0.55) {
      // jehličnan – vrstvené kužely
      for (let i = 0; i < 3; i++) {
        const r = 1.7 - i * 0.45, ch = 1.5 - i * 0.2;
        const cone = solid(new THREE.ConeGeometry(r, ch, 8), lm);
        cone.position.y = h + 0.2 + i * 0.85; g.add(cone);
      }
    } else {
      // listnatý – shluk koulí
      for (let i = 0; i < 4; i++) {
        const r = 0.8 + Math.random() * 0.6;
        const blob = solid(new THREE.IcosahedronGeometry(r, 0), lm);
        blob.position.set((Math.random() - 0.5) * 1.2, h + 0.4 + Math.random() * 1.2, (Math.random() - 0.5) * 1.2);
        g.add(blob);
      }
    }
    g.position.set(x, 0, z);
    g.rotation.y = Math.random() * Math.PI;
    scene.add(g);
  }
  // přírodně tvarovaný balvan (jitterovaný icosahedron)
  function addRock(x, z) {
    const g = new THREE.Group();
    const n = 1 + (Math.random() * 3 | 0);
    for (let i = 0; i < n; i++) {
      const r = 0.5 + Math.random() * 0.9;
      const geo = new THREE.IcosahedronGeometry(r, 0);
      const p = geo.attributes.position;
      for (let v = 0; v < p.count; v++) {
        p.setXYZ(v, p.getX(v) * (0.8 + Math.random() * 0.4),
                    p.getY(v) * (0.7 + Math.random() * 0.3),
                    p.getZ(v) * (0.8 + Math.random() * 0.4));
      }
      geo.computeVertexNormals();
      const b = solid(geo, rockMat);
      b.position.set((Math.random() - 0.5) * 1.2, r * 0.4, (Math.random() - 0.5) * 1.2);
      b.rotation.set(Math.random(), Math.random(), Math.random());
      g.add(b);
    }
    g.position.set(x, 0, z); scene.add(g);
  }
  // pochodeň: kovový stojan + zářící plamen + světlo
  const torchPostMat = new THREE.MeshStandardMaterial({ color: 0x2b2b30, roughness: 0.5, metalness: 0.8 });
  function addTorch(x, z) {
    const g = new THREE.Group();
    const post = solid(new THREE.CylinderGeometry(0.08, 0.12, 2.6, 8), torchPostMat);
    post.position.y = 1.3; g.add(post);
    const bowl = solid(new THREE.CylinderGeometry(0.26, 0.14, 0.3, 8), torchPostMat);
    bowl.position.y = 2.65; g.add(bowl);
    const flame = new THREE.Mesh(new THREE.IcosahedronGeometry(0.32, 0),
      new THREE.MeshBasicMaterial({ color: 0xffc24d }));
    flame.position.y = 2.95; g.add(flame);
    const light = new THREE.PointLight(0xffa838, 3.0, 16, 2);
    light.position.set(0, 3.0, 0); g.add(light);
    g.position.set(x, 0, z); scene.add(g);
    torchFlames.push(flame);
  }
  const torchFlames = [];

  // rozmístění dekorací mimo střed
  function randSpot() {
    let x, z;
    do { x = (Math.random() - 0.5) * ARENA * 1.7; z = (Math.random() - 0.5) * ARENA * 1.7; }
    while (Math.hypot(x, z) < 7);
    return [x, z];
  }
  for (let i = 0; i < 12; i++) { const [x, z] = randSpot(); addTree(x, z); }
  for (let i = 0; i < 8; i++) { const [x, z] = randSpot(); addRock(x, z); }
  for (const p of [[-14, -14], [14, -14], [-14, 14], [14, 14]]) addTorch(p[0], p[1]);

  // ---------- Hrdina ----------
  const hero = new THREE.Group();
  scene.add(hero);

  const skinMat = new THREE.MeshStandardMaterial({ color: 0xe9b48a, roughness: 0.8 });
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2f5fbf, roughness: 0.7, metalness: 0.1 });
  const beltMat = new THREE.MeshStandardMaterial({ color: 0x5a3d24, roughness: 0.9 });
  const legMat = new THREE.MeshStandardMaterial({ color: 0x2b3a55, roughness: 0.9 });
  const armorMat = new THREE.MeshStandardMaterial({ color: 0xb8c0cc, roughness: 0.4, metalness: 0.7 });
  const capeMat = new THREE.MeshStandardMaterial({ color: 0xb23a48, roughness: 0.85 });
  const hairMat = new THREE.MeshStandardMaterial({ color: 0x5a3a1e, roughness: 0.9 });

  // tělo – zaoblený trup (kapsle) v modré tunice
  const torso = solid(new THREE.CapsuleGeometry(0.36, 0.5, 6, 14), bodyMat);
  torso.position.y = 1.2; torso.scale.z = 0.78; hero.add(torso);
  // hrudní pancíř
  const chest = solid(new THREE.CapsuleGeometry(0.34, 0.3, 6, 14), armorMat);
  chest.position.y = 1.4; chest.scale.set(1.05, 0.8, 0.85); hero.add(chest);
  const belt = solid(new THREE.CylinderGeometry(0.4, 0.4, 0.16, 14), beltMat);
  belt.position.y = 0.82; belt.scale.z = 0.78; hero.add(belt);
  // ramenní pancíř (kulové naramenníky)
  const pauldL = solid(new THREE.SphereGeometry(0.24, 12, 10), armorMat); pauldL.position.set(-0.46, 1.58, 0); hero.add(pauldL);
  const pauldR = solid(new THREE.SphereGeometry(0.24, 12, 10), armorMat); pauldR.position.set(0.46, 1.58, 0); hero.add(pauldR);
  // plášť za zády
  const cape = box(0.66, 1.05, 0.08, capeMat); cape.position.set(0, 1.18, -0.32); cape.rotation.x = 0.14; hero.add(cape);

  const head = solid(new THREE.SphereGeometry(0.3, 16, 14), skinMat); head.position.y = 1.92; hero.add(head);
  // vlasy jako čepička
  const hair = solid(new THREE.SphereGeometry(0.32, 16, 12, 0, Math.PI * 2, 0, Math.PI * 0.6), hairMat);
  hair.position.y = 1.96; hero.add(hair);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x222428, roughness: 0.4 });
  const eyeL = solid(new THREE.SphereGeometry(0.05, 8, 8), eyeMat); eyeL.position.set(-0.11, 1.94, 0.26); hero.add(eyeL);
  const eyeR = solid(new THREE.SphereGeometry(0.05, 8, 8), eyeMat); eyeR.position.set(0.11, 1.94, 0.26); hero.add(eyeR);

  const legL = solid(new THREE.CapsuleGeometry(0.15, 0.5, 5, 10), legMat); legL.position.set(-0.2, 0.42, 0); hero.add(legL);
  const legR = solid(new THREE.CapsuleGeometry(0.15, 0.5, 5, 10), legMat); legR.position.set(0.2, 0.42, 0); hero.add(legR);
  const bootL = solid(new THREE.SphereGeometry(0.18, 10, 8), beltMat); bootL.position.set(-0.2, 0.1, 0.06); bootL.scale.z = 1.4; hero.add(bootL);
  const bootR = solid(new THREE.SphereGeometry(0.18, 10, 8), beltMat); bootR.position.set(0.2, 0.1, 0.06); bootR.scale.z = 1.4; hero.add(bootR);

  // Levá paže + štít
  const armL = solid(new THREE.CapsuleGeometry(0.12, 0.5, 5, 10), skinMat); armL.position.set(-0.5, 1.2, 0); hero.add(armL);
  const shield = new THREE.Group();
  const shieldMat = new THREE.MeshStandardMaterial({ color: 0x6e7787, roughness: 0.45, metalness: 0.6 });
  const shieldFace = solid(new THREE.CylinderGeometry(0.42, 0.42, 0.1, 20), shieldMat);
  shieldFace.rotation.z = Math.PI / 2; shieldFace.scale.set(1, 1, 1.25);
  const shieldBoss = solid(new THREE.SphereGeometry(0.12, 12, 10), new THREE.MeshStandardMaterial({ color: 0xd9b24a, roughness: 0.35, metalness: 0.7 }));
  shieldBoss.position.x = 0.06; shield.add(shieldFace); shield.add(shieldBoss);
  shield.position.set(-0.72, 1.2, 0.08); hero.add(shield);

  // Pravá paže + meč (pivot pro animaci úderu)
  const armPivot = new THREE.Group();
  armPivot.position.set(0.5, 1.55, 0);
  hero.add(armPivot);
  const armR = solid(new THREE.CapsuleGeometry(0.12, 0.5, 5, 10), skinMat); armR.position.y = -0.35; armPivot.add(armR);

  const swordMat = new THREE.MeshStandardMaterial({ color: 0xeef2f7, roughness: 0.18, metalness: 0.95 });
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0xdfeeff, emissive: 0x4f7bd0, emissiveIntensity: 1.4, roughness: 0.2, metalness: 0.9 });
  const guardMat = new THREE.MeshStandardMaterial({ color: 0xd9b24a, roughness: 0.4, metalness: 0.7 });
  const sword = new THREE.Group();
  const blade = box(0.14, 1.5, 0.05, swordMat); blade.position.y = -1.0; sword.add(blade);
  const edge = box(0.04, 1.5, 0.07, edgeMat); edge.position.y = -1.0; sword.add(edge);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.3, 4), swordMat); tip.position.y = -1.85; tip.rotation.y = Math.PI / 4; sword.add(tip);
  const guard = solid(new THREE.CylinderGeometry(0.07, 0.07, 0.55, 8), guardMat); guard.rotation.z = Math.PI / 2; guard.position.y = -0.2; sword.add(guard);
  const grip = solid(new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8), beltMat); grip.position.y = 0; sword.add(grip);
  const pommel = solid(new THREE.SphereGeometry(0.09, 10, 8), guardMat); pommel.position.y = 0.22; sword.add(pommel);
  sword.position.set(0, -0.7, 0.05);
  armPivot.add(sword);

  hero.position.set(0, 0, 0);
  let heroAngle = 0;         // směr, kam hrdina kouká (yaw)
  const heroRadius = 0.55;
  const HERO_MAX_HP = 100;
  let heroHP = HERO_MAX_HP;

  // ---------- Příšery ----------
  const enemies = [];
  const enemyEyeMat = new THREE.MeshBasicMaterial({ color: 0xfff04d });
  const hornMat = new THREE.MeshStandardMaterial({ color: 0xe8e2d0, roughness: 0.6 });
  // typy příšer: barva, velikost, rychlost, rohy
  const enemyTypes = [
    { color: 0x7a2f3a, scale: 1.0, speed: 2.6, horns: true,  hp: 30 }, // skřet
    { color: 0x39603a, scale: 0.85, speed: 3.4, horns: false, hp: 22 }, // skřítek (rychlý)
    { color: 0x4a3b6b, scale: 1.25, speed: 1.9, horns: true,  hp: 46 }  // obr (pomalý, tuhý)
  ];

  function spawnEnemy() {
    const type = enemyTypes[(Math.random() * enemyTypes.length) | 0];
    const g = new THREE.Group();
    // vlastní materiál pro každou příšeru (kvůli probliknutí při zásahu)
    const bodyMat = new THREE.MeshStandardMaterial({ color: type.color, roughness: 0.8, metalness: 0.05, flatShading: true });
    // zavalité oblé tělo
    const body = solid(new THREE.IcosahedronGeometry(0.62, 1), bodyMat);
    body.position.y = 0.78; body.scale.set(1, 1.05, 0.95); g.add(body);
    const head = solid(new THREE.IcosahedronGeometry(0.4, 1), bodyMat);
    head.position.y = 1.5; head.scale.set(1.1, 0.95, 1); g.add(head);
    // tlama
    const jaw = solid(new THREE.BoxGeometry(0.5, 0.18, 0.42), bodyMat); jaw.position.set(0, 1.28, 0.22); g.add(jaw);
    // zuby
    const teethMat = new THREE.MeshStandardMaterial({ color: 0xf0ead6, roughness: 0.6 });
    for (let t = -1; t <= 1; t += 2) {
      const tooth = solid(new THREE.ConeGeometry(0.05, 0.16, 4), teethMat);
      tooth.position.set(t * 0.13, 1.34, 0.42); tooth.rotation.x = Math.PI; g.add(tooth);
    }
    // zářící oči
    const eyeL = solid(new THREE.SphereGeometry(0.09, 8, 8), enemyEyeMat); eyeL.position.set(-0.16, 1.56, 0.34); g.add(eyeL);
    const eyeR = solid(new THREE.SphereGeometry(0.09, 8, 8), enemyEyeMat); eyeR.position.set(0.16, 1.56, 0.34); g.add(eyeR);
    const legL = solid(new THREE.CapsuleGeometry(0.14, 0.3, 4, 8), bodyMat); legL.position.set(-0.26, 0.3, 0); g.add(legL);
    const legR = solid(new THREE.CapsuleGeometry(0.14, 0.3, 4, 8), bodyMat); legR.position.set(0.26, 0.3, 0); g.add(legR);
    const armL = solid(new THREE.CapsuleGeometry(0.12, 0.35, 4, 8), bodyMat); armL.position.set(-0.6, 0.85, 0); armL.rotation.z = 0.3; g.add(armL);
    const armR = solid(new THREE.CapsuleGeometry(0.12, 0.35, 4, 8), bodyMat); armR.position.set(0.6, 0.85, 0); armR.rotation.z = -0.3; g.add(armR);
    if (type.horns) {
      const hL = solid(new THREE.ConeGeometry(0.1, 0.4, 6), hornMat); hL.position.set(-0.22, 1.9, 0); hL.rotation.z = 0.4; g.add(hL);
      const hR = solid(new THREE.ConeGeometry(0.1, 0.4, 6), hornMat); hR.position.set(0.22, 1.9, 0); hR.rotation.z = -0.4; g.add(hR);
    }
    g.scale.setScalar(type.scale);

    // Spawn na okraji arény, daleko od hrdiny
    let x, z;
    do {
      const a = Math.random() * Math.PI * 2;
      const r = ARENA * (0.5 + Math.random() * 0.4);
      x = Math.cos(a) * r; z = Math.sin(a) * r;
    } while (Math.hypot(x - hero.position.x, z - hero.position.z) < 12);
    g.position.set(x, 0, z);
    scene.add(g);

    enemies.push({
      group: g, bodyMat, hp: type.hp, baseScale: type.scale, radius: 0.6 * type.scale,
      speed: type.speed + Math.random() * 0.6,
      hitCooldown: 0, flash: 0, walk: Math.random() * 10
    });
  }

  // ---------- Efekty zásahu ----------
  const sparks = []; // krátké vizuální "jiskry" v místě zásahu
  const sparkGeo = new THREE.BoxGeometry(0.18, 0.18, 0.18);
  function spawnHitSpark(x, y, z) {
    const mat = new THREE.MeshBasicMaterial({ color: 0xfff2a0 });
    for (let i = 0; i < 8; i++) {
      const m = new THREE.Mesh(sparkGeo, mat);
      m.position.set(x, y, z);
      const a = Math.random() * Math.PI * 2, up = Math.random() * 4 + 2;
      m.userData.v = new THREE.Vector3(Math.cos(a) * 4, up, Math.sin(a) * 4);
      scene.add(m);
      sparks.push({ mesh: m, life: 0.4 });
    }
  }

  // ---------- Plovoucí čísla poškození ----------
  const floatersEl = document.getElementById('floaters');
  const floaters = []; // { el, pos:Vector3, vy, life, maxLife }
  const projV = new THREE.Vector3();
  function spawnDamageNumber(x, y, z, amount, kind) {
    const el = document.createElement('div');
    el.className = 'dmg ' + kind; // 'deal' | 'crit' | 'take'
    el.textContent = (kind === 'take' ? '-' : '') + amount;
    floatersEl.appendChild(el);
    floaters.push({
      el,
      pos: new THREE.Vector3(x + (Math.random() - 0.5) * 0.5, y, z),
      vy: 2.4, life: 0.9, maxLife: 0.9
    });
  }
  function updateFloaters(dt) {
    for (let i = floaters.length - 1; i >= 0; i--) {
      const f = floaters[i];
      f.life -= dt;
      f.pos.y += f.vy * dt;
      f.vy *= 0.92;
      if (f.life <= 0) { f.el.remove(); floaters.splice(i, 1); continue; }
      projV.copy(f.pos).project(camera);
      const sx = (projV.x * 0.5 + 0.5) * window.innerWidth;
      const sy = (-projV.y * 0.5 + 0.5) * window.innerHeight;
      const t = f.life / f.maxLife; // 1 -> 0
      f.el.style.left = sx + 'px';
      f.el.style.top = sy + 'px';
      f.el.style.opacity = Math.min(1, t * 1.6);
      const scale = 0.8 + (1 - t) * 0.3;
      f.el.style.transform = `translate(-50%, -50%) scale(${scale})`;
    }
  }
  function clearFloaters() {
    for (const f of floaters) f.el.remove();
    floaters.length = 0;
  }

  // ---------- Ovládání ----------
  const keys = {};
  window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') { e.preventDefault(); attack(); }
  });
  window.addEventListener('keyup', (e) => { keys[e.code] = false; });

  // Pevná kamera ve stylu Diablo (shora pod úhlem, neotáčí se)
  // Kliknutím se útočí mečem.
  canvas.addEventListener('click', () => { attack(); });

  // Mobilní joystick
  const stick = document.getElementById('stick');
  const knob = document.getElementById('knob');
  let moveVec = { x: 0, y: 0 };
  let stickId = null;
  function stickStart(e) {
    const t = e.changedTouches ? e.changedTouches[0] : e;
    stickId = e.changedTouches ? t.identifier : 'mouse';
    stickMove(e);
  }
  function stickMove(e) {
    const touches = e.changedTouches || [e];
    let t = null;
    for (const tt of touches) { if ((tt.identifier ?? 'mouse') === stickId) t = tt; }
    if (!t) return;
    const r = stick.getBoundingClientRect();
    let dx = t.clientX - (r.left + r.width / 2);
    let dy = t.clientY - (r.top + r.height / 2);
    const max = r.width / 2;
    const len = Math.hypot(dx, dy);
    if (len > max) { dx = dx / len * max; dy = dy / len * max; }
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
    moveVec.x = dx / max; moveVec.y = dy / max;
  }
  function stickEnd() {
    stickId = null; moveVec.x = 0; moveVec.y = 0;
    knob.style.transform = 'translate(0,0)';
  }
  stick.addEventListener('touchstart', (e) => { e.preventDefault(); stickStart(e); }, { passive: false });
  stick.addEventListener('touchmove', (e) => { e.preventDefault(); stickMove(e); }, { passive: false });
  stick.addEventListener('touchend', (e) => { e.preventDefault(); stickEnd(); }, { passive: false });
  document.getElementById('attackBtn').addEventListener('touchstart', (e) => { e.preventDefault(); attack(); }, { passive: false });

  // ---------- Útok ----------
  let attackTimer = 0;       // doba trvání animace úderu
  let attackCooldown = 0;    // než lze znovu seknout
  let didHit = false;        // zda už zásah v aktuálním úderu proběhl
  function attack() {
    if (!running || attackCooldown > 0) return;
    attackTimer = 0.32;
    attackCooldown = 0.42;
    didHit = false;
  }

  // ---------- Stav hry ----------
  let running = false;
  let score = 0;
  let spawnTimer = 0;
  let spawnInterval = 2.4;
  const hpFill = document.querySelector('#hpBar > span');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ovTitle');
  const ovText = document.getElementById('ovText');
  const ovBtn = document.getElementById('ovBtn');
  const ovFsBtn = document.getElementById('ovFsBtn');

  // Celá obrazovka + zámek na šířku (na telefonu schová lišty prohlížeče)
  async function goFullscreen() {
    const el = document.documentElement;
    try {
      if (!document.fullscreenElement) {
        await (el.requestFullscreen ? el.requestFullscreen() : el.webkitRequestFullscreen?.());
      }
    } catch (e) { /* některé prohlížeče fullscreen odmítnou – ignorujeme */ }
    try { await screen.orientation?.lock?.('landscape'); } catch (e) { /* iOS Safari nepodporuje */ }
  }

  function showOverlay(title, text, btn) {
    ovTitle.textContent = title; ovText.textContent = text; ovBtn.textContent = btn;
    overlay.classList.remove('hidden');
  }
  function startGame() {
    // vyčistit příšery
    for (const e of enemies) scene.remove(e.group);
    enemies.length = 0;
    for (const sp of sparks) scene.remove(sp.mesh);
    sparks.length = 0;
    clearFloaters();
    heroHP = HERO_MAX_HP; score = 0; spawnTimer = 0; spawnInterval = 2.4;
    hero.position.set(0, 0, 0); heroAngle = 0;
    scoreEl.textContent = '⚔️ Skóre: 0';
    hpFill.style.width = '100%';
    overlay.classList.add('hidden');
    running = true;
    for (let i = 0; i < 3; i++) spawnEnemy();
  }
  function gameOver() {
    running = false;
    showOverlay('Padl jsi 💀', `Skóre: ${score} poražených příšer.`, 'Hrát znovu');
  }
  ovBtn.addEventListener('click', startGame);
  ovFsBtn.addEventListener('click', async () => { await goFullscreen(); startGame(); });
  showOverlay('Hrdina meče ⚔️', 'Chod po aréně, sekej mečem a poraz co nejvíce příšer. WASD = pohyb, mezerník / klik = útok.', 'Hrát');

  // ---------- Pomocné vektory ----------
  const tmp = new THREE.Vector3();

  // ---------- Postprocessing: jemný bloom (záře mečů, pochodní, očí) ----------
  // Načítáme defenzivně – když se nepodaří, hra běží bez něj.
  let composer = null;
  try {
    const { EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js');
    const { RenderPass } = await import('three/addons/postprocessing/RenderPass.js');
    const { UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js');
    const { OutputPass } = await import('three/addons/postprocessing/OutputPass.js');
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight), 0.55, 0.5, 0.82);
    composer.addPass(bloom);
    composer.addPass(new OutputPass());
  } catch (e) { composer = null; }

  // ---------- Smyčka ----------
  let last = performance.now();
  function animate(now) {
    requestAnimationFrame(animate);
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;

    if (running) update(dt);
    if (composer) composer.render(); else renderer.render(scene, camera);
  }

  function update(dt) {
    // --- Vstup pohybu ---
    let ix = 0, iz = 0;
    if (keys['KeyW'] || keys['ArrowUp']) iz -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) iz += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) ix -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
    if (moveVec.x || moveVec.y) { ix += moveVec.x; iz += moveVec.y; }

    // Pevná kamera (Diablo styl): pohyb je vůči obrazovce.
    // +x = doprava, -z = nahoru (od kamery do hloubky).
    let dx = ix;
    let dz = iz;
    const len = Math.hypot(dx, dz);
    const moving = len > 0.01;
    if (moving) {
      dx /= len; dz /= len;
      const speed = 6.5;
      hero.position.x += dx * speed * dt;
      hero.position.z += dz * speed * dt;
      heroAngle = Math.atan2(dx, dz);
    }

    // Hranice arény
    const lim = ARENA - 1.5;
    hero.position.x = Math.max(-lim, Math.min(lim, hero.position.x));
    hero.position.z = Math.max(-lim, Math.min(lim, hero.position.z));

    // Otáčení hrdiny k požadovanému směru
    let da = heroAngle - hero.rotation.y;
    while (da > Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    hero.rotation.y += da * Math.min(1, dt * 12);

    // Animace nohou při chůzi
    const t = performance.now() / 1000;
    if (moving) {
      const sw = Math.sin(t * 10) * 0.5;
      legL.rotation.x = sw; legR.rotation.x = -sw;
    } else {
      legL.rotation.x *= 0.8; legR.rotation.x *= 0.8;
    }

    // --- Útok / animace meče ---
    if (attackCooldown > 0) attackCooldown -= dt;
    if (attackTimer > 0) {
      attackTimer -= dt;
      const p = 1 - Math.max(0, attackTimer) / 0.32; // 0..1
      // šikmý švih: z pravého ramene dolů doleva (kombinace os X a Z)
      const swing = Math.sin(p * Math.PI); // 0 -> 1 -> 0
      armPivot.rotation.x = -1.9 + swing * 2.4;   // shora dolů
      armPivot.rotation.z = -1.4 + swing * 2.2;   // zprava doleva (šikmo)
      // zásah uprostřed švihu
      if (!didHit && p > 0.35) { didHit = true; doMeleeHit(); }
    } else {
      armPivot.rotation.x += (0 - armPivot.rotation.x) * Math.min(1, dt * 10);
      armPivot.rotation.z += (0 - armPivot.rotation.z) * Math.min(1, dt * 10);
    }

    // --- Příšery ---
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      tmp.set(hero.position.x - e.group.position.x, 0, hero.position.z - e.group.position.z);
      const dist = tmp.length();
      if (dist > 0.001) tmp.divideScalar(dist);

      // pohyb k hrdinovi
      if (dist > e.radius + heroRadius + 0.1) {
        e.group.position.x += tmp.x * e.speed * dt;
        e.group.position.z += tmp.z * e.speed * dt;
        e.walk += dt * 8;
        e.group.position.y = Math.abs(Math.sin(e.walk)) * 0.12;
      } else {
        e.group.position.y *= 0.8;
      }
      // natočení k hrdinovi
      e.group.rotation.y = Math.atan2(tmp.x, tmp.z);

      // útok na hrdinu
      if (e.hitCooldown > 0) e.hitCooldown -= dt;
      if (dist < e.radius + heroRadius + 0.25 && e.hitCooldown <= 0) {
        e.hitCooldown = 1.0;
        const dmg = 6 + Math.floor(Math.random() * 5); // 6–10
        heroHP = Math.max(0, heroHP - dmg);
        hpFill.style.width = (heroHP / HERO_MAX_HP * 100) + '%';
        spawnDamageNumber(hero.position.x, 2.4, hero.position.z, dmg, 'take');
        if (heroHP <= 0) { gameOver(); return; }
      }

      // probliknutí po zásahu – jasně bílá + nafouknutí
      if (e.flash > 0) {
        e.flash -= dt;
        const f = Math.max(0, e.flash) / 0.25;
        e.bodyMat.emissive.setRGB(f, f, f);
        e.group.scale.setScalar(e.baseScale * (1 + f * 0.35));
      } else {
        e.bodyMat.emissive.setRGB(0, 0, 0);
        e.group.scale.setScalar(e.baseScale);
      }
    }

    // --- Jiskry zásahu ---
    for (let i = sparks.length - 1; i >= 0; i--) {
      const sp = sparks[i];
      sp.life -= dt;
      const m = sp.mesh;
      m.userData.v.y -= 14 * dt; // gravitace
      m.position.addScaledVector(m.userData.v, dt);
      m.scale.setScalar(Math.max(0.01, sp.life / 0.4));
      if (sp.life <= 0) { scene.remove(m); sparks.splice(i, 1); }
    }

    // --- Plovoucí čísla poškození ---
    updateFloaters(dt);

    // --- Mihotání pochodní ---
    const ft = performance.now() / 1000;
    for (let i = 0; i < torchFlames.length; i++) {
      const fl = 0.85 + Math.sin(ft * 12 + i * 2.1) * 0.12 + Math.random() * 0.06;
      torchFlames[i].scale.set(fl, fl + 0.15, fl);
    }

    // --- Spawn ---
    spawnTimer += dt;
    if (spawnTimer > spawnInterval) {
      spawnTimer = 0;
      spawnEnemy();
      spawnInterval = Math.max(0.9, spawnInterval * 0.97); // časem zrychluj
    }

    // --- Kamera (pevná, shora pod úhlem jako v Diablu) ---
    const tx = hero.position.x;
    const ty = hero.position.y + CAM_HEIGHT;
    const tz = hero.position.z + CAM_BACK;
    camera.position.lerp(tmp.set(tx, ty, tz), Math.min(1, dt * 8));
    camera.lookAt(hero.position.x, hero.position.y + 0.5, hero.position.z);
  }

  function doMeleeHit() {
    // dosah meče před hrdinou
    const reach = 2.4, halfAngle = Math.cos(0.9);
    const fx = Math.sin(hero.rotation.y), fz = Math.cos(hero.rotation.y);
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const ex = e.group.position.x - hero.position.x;
      const ez = e.group.position.z - hero.position.z;
      const d = Math.hypot(ex, ez);
      if (d > reach + e.radius) continue;
      const dot = (ex * fx + ez * fz) / (d || 1);
      if (dot < halfAngle) continue; // mimo úhel seku
      // zásah! výpočet poškození (občas kritický)
      const crit = Math.random() < 0.18;
      const dmg = (crit ? 2 : 1) * (8 + Math.floor(Math.random() * 5)); // 8–12, krit 2×
      e.hp -= dmg;
      e.flash = 0.25;
      // jiskry + plovoucí číslo v místě zásahu
      spawnHitSpark(e.group.position.x, 1.0, e.group.position.z);
      spawnDamageNumber(e.group.position.x, 2.1, e.group.position.z, dmg, crit ? 'crit' : 'deal');
      // odhození
      e.group.position.x += fx * 0.8;
      e.group.position.z += fz * 0.8;
      if (e.hp <= 0) {
        scene.remove(e.group);
        enemies.splice(i, 1);
        score++;
        scoreEl.textContent = '⚔️ Skóre: ' + score;
      }
    }
  }

  // ---------- Resize ----------
  function onResize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h, false);
    if (composer) composer.setSize(w, h);
  }
  window.addEventListener('resize', onResize);
  window.addEventListener('orientationchange', () => setTimeout(onResize, 200));
  document.addEventListener('fullscreenchange', () => setTimeout(onResize, 100));
  onResize();

  requestAnimationFrame(animate);
  </script>
</body>
</html>
