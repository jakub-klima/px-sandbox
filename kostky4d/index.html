<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stavba věže 4D – skládání tesseraktů</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: linear-gradient(#1b2735 0%, #090a0f 100%);
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }
    body { display: flex; flex-direction: column; }
    #game { flex: 1 1 auto; width: 100%; min-height: 0; display: block; }
    #hud {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    #hud h1 { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
    #hud p { font-size: 13px; opacity: .75; margin-top: 4px; }
    #score { font-size: 15px; margin-top: 6px; opacity: .9; }
    #controls {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: rgba(9,10,15,.85);
      border-top: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 -6px 18px rgba(0,0,0,.35);
      flex-wrap: wrap;
    }
    #controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 22px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 14px;
      backdrop-filter: blur(6px);
      cursor: pointer;
    }
    #controls button:active { background: rgba(255,255,255,.25); }
    #mode.destroy {
      background: rgba(231,76,60,.85);
      box-shadow: 0 0 16px rgba(231,76,60,.6);
    }
    #sound.off { opacity: .55; }
    #spin.off { opacity: .55; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <h1>🧊 Postav věž 4D</h1>
    <p id="hint">Klepni nebo klikni a pusť tesserakt – spadne a naskládá se</p>
    <div id="score">Tesserakty: 0 &middot; Výška: 0</div>
  </div>
  <div id="controls">
    <button id="mode">🧊 Stavět</button>
    <button id="spin">🌀 Rotace 4D</button>
    <button id="sound">🔊 Zvuk</button>
    <button id="reset">Vyčistit</button>
  </div>

  <script>
  (function () {
    'use strict';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // ---------- Konfigurace ----------
    const SIZE = 27;          // velikost tesseraktu pro projekci (px)
    const HALF = 40;          // poloviční rozměr kolizní krabice (px)
    const DIST4 = 2.6;        // vzdálenost projekce 4D -> 3D
    const DIST3 = 4.2;        // vzdálenost projekce 3D -> 2D
    const GRAVITY = 2000;     // px/s^2
    const STEP = 1 / 120;     // pevný krok simulace
    const ITER = 12;          // iterace kolizního řešiče (vyšší = stabilnější věž)
    const VMAX = 1400;        // mezní rychlost
    const COLORS = ['#e74c3c','#f39c12','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e84393'];

    let W, H, DPR;
    let bodies = [];          // padající / naskládané tesserakty
    let uid = 0;
    let spin = true;          // probíhá 4D rotace?
    let pendingImpact = 0;    // nejsilnější náraz v rámci snímku (pro zvuk)

    // ---------- Zvuky (syntetizované přes Web Audio, bez externích souborů) ----------
    const Sound = (function () {
      let actx = null, enabled = true;
      function ensure() {
        if (!actx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) actx = new AC();
        }
        if (actx && actx.state === 'suspended') actx.resume();
        return actx;
      }
      function tone(freq, dur, type, gain, slideTo) {
        if (!enabled || !ensure()) return;
        const t = actx.currentTime;
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = type || 'sine';
        o.frequency.setValueAtTime(freq, t);
        if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g).connect(actx.destination);
        o.start(t); o.stop(t + dur + 0.02);
      }
      function noise(dur, gain) {
        if (!enabled || !ensure()) return;
        const t = actx.currentTime;
        const n = Math.floor(actx.sampleRate * dur);
        const buf = actx.createBuffer(1, n, actx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
        const src = actx.createBufferSource(); src.buffer = buf;
        const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
        const g = actx.createGain(); g.gain.value = gain;
        src.connect(f).connect(g).connect(actx.destination);
        src.start(t);
      }
      return {
        // jemně "zazvonivý" tón – tesserakt se objeví ze 4. rozměru
        place: function () { tone(520, 0.10, 'triangle', 0.10, 760); },
        destroy: function () { noise(0.3, 0.22); tone(150, 0.28, 'sawtooth', 0.10, 40); },
        impact: function (speed) {
          const gain = Math.min(0.16, speed / 1400 * 0.16);
          if (gain < 0.012) return;
          tone(120 + Math.random() * 40, 0.06, 'triangle', gain, 70);
        },
        toggle: function () { enabled = !enabled; if (enabled) ensure(); return enabled; },
        isOn: function () { return enabled; },
        wake: function () { ensure(); }
      };
    })();

    // ---------- Geometrie tesseraktu (4-krychle) ----------
    // 16 vrcholů = všechny kombinace (±1, ±1, ±1, ±1)
    const VERTS = [];
    for (let i = 0; i < 16; i++) {
      VERTS.push([
        (i & 1) ? 1 : -1,
        (i & 2) ? 1 : -1,
        (i & 4) ? 1 : -1,
        (i & 8) ? 1 : -1
      ]);
    }
    // Hrany spojují vrcholy lišící se právě v jedné souřadnici (jeden bit).
    const EDGES = [];
    for (let i = 0; i < 16; i++) {
      for (let j = i + 1; j < 16; j++) {
        const diff = i ^ j;
        if ((diff & (diff - 1)) === 0) EDGES.push([i, j]);   // mocnina dvojky = jeden bit
      }
    }

    // Projekce jednoho 4D vrcholu na 2D plátno s rotací ve 4. rozměru.
    function project(v, axw, ayw, azw, ry, scale, cx, cy) {
      let x = v[0], y = v[1], z = v[2], w = v[3];
      let c, s, t;
      // rotace v rovině XW
      c = Math.cos(axw); s = Math.sin(axw);
      t = x * c - w * s; w = x * s + w * c; x = t;
      // rotace v rovině YW
      c = Math.cos(ayw); s = Math.sin(ayw);
      t = y * c - w * s; w = y * s + w * c; y = t;
      // rotace v rovině ZW
      c = Math.cos(azw); s = Math.sin(azw);
      t = z * c - w * s; w = z * s + w * c; z = t;
      // perspektivní projekce 4D -> 3D
      const k4 = DIST4 / (DIST4 - w);
      x *= k4; y *= k4; z *= k4;
      // jemná rotace v 3D kolem osy Y, ať je vidět hloubka
      c = Math.cos(ry); s = Math.sin(ry);
      t = x * c - z * s; z = x * s + z * c; x = t;
      // perspektivní projekce 3D -> 2D
      const k3 = DIST3 / (DIST3 - z);
      return {
        x: cx + x * scale * k3,
        y: cy + y * scale * k3,
        depth: z
      };
    }

    // ---------- Svět ----------
    function floorY() { return H - 24; }

    function addTesseract(x) {
      x = Math.max(HALF, Math.min(W - HALF, x));
      bodies.push({
        id: uid++,
        x: x, y: -HALF,            // start nad plátnem – tesserakt spadne dolů
        vx: 0, vy: 0,
        color: COLORS[uid % COLORS.length],
        phase: Math.random() * Math.PI * 2,
        rest: false                // leží v klidu na podložce/jiném tesseraktu?
      });
      Sound.place();
      updateScore();
    }

    function bodyAt(px, py) {
      // od vrchu (poslední přidané) – vrať tesserakt pod kurzorem
      for (let i = bodies.length - 1; i >= 0; i--) {
        const b = bodies[i];
        if (Math.abs(px - b.x) <= HALF && Math.abs(py - b.y) <= HALF) return b;
      }
      return null;
    }

    function destroyBody(b) {
      const idx = bodies.indexOf(b);
      if (idx === -1) return;
      bodies.splice(idx, 1);
      spawnPop(b.x, b.y, b.color);
      Sound.destroy();
      updateScore();
    }

    // ---------- Krok fyziky (gravitace + kolize krabic) ----------
    function step(dt) {
      // integrace gravitace + mezní rychlost
      for (const b of bodies) {
        b.vy += GRAVITY * dt;
        if (b.vy > VMAX) b.vy = VMAX; else if (b.vy < -VMAX) b.vy = -VMAX;
        if (b.vx > VMAX) b.vx = VMAX; else if (b.vx < -VMAX) b.vx = -VMAX;
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.rest = false;
      }

      // iterativní řešení kolizí (relaxace pozic + nepružné tlumení rychlostí)
      for (let it = 0; it < ITER; it++) {
        // podlaha a stěny
        for (const b of bodies) {
          if (b.y + HALF > floorY()) {
            b.y = floorY() - HALF;
            if (b.vy > 0) { if (b.vy > pendingImpact) pendingImpact = b.vy; b.vy = 0; }
            b.vx *= 0.86;                 // tření o zem
            b.rest = true;
          }
          if (b.x - HALF < 0) { b.x = HALF; if (b.vx < 0) b.vx = 0; }
          if (b.x + HALF > W) { b.x = W - HALF; if (b.vx > 0) b.vx = 0; }
        }
        // dvojice tesseraktů – kolize os-zarovnaných krabic
        for (let i = 0; i < bodies.length; i++) {
          for (let j = i + 1; j < bodies.length; j++) {
            const A = bodies[i], B = bodies[j];
            const dx = B.x - A.x, dy = B.y - A.y;
            const ox = 2 * HALF - Math.abs(dx);
            const oy = 2 * HALF - Math.abs(dy);
            if (ox <= 0 || oy <= 0) continue;          // nepřekrývají se
            if (ox < oy) {
              // rozsuň podél X (menší průnik)
              const push = (dx < 0 ? -ox : ox) / 2;
              A.x -= push; B.x += push;
              const m = (A.vx + B.vx) / 2;             // nepružné po ose X
              A.vx = m; B.vx = m;
            } else {
              // rozsuň podél Y
              const push = (dy < 0 ? -oy : oy) / 2;
              A.y -= push; B.y += push;
              const rel = Math.abs(B.vy - A.vy);
              if (rel > pendingImpact) pendingImpact = rel;
              const m = (A.vy + B.vy) / 2;             // nepružné po ose Y
              A.vy = m; B.vy = m;
              // jemné tření v místě dotyku
              const fm = (A.vx + B.vx) / 2;
              A.vx += (fm - A.vx) * 0.25;
              B.vx += (fm - B.vx) * 0.25;
              if (dy > 0) A.rest = true; else B.rest = true;
            }
          }
        }
      }

      // utlumení drobného chvění u ležících těles (ať věž "usne")
      for (const b of bodies) {
        if (b.rest && Math.abs(b.vy) < 6) b.vy = 0;
        if (b.rest) b.vx *= 0.9;
      }
    }

    // ---------- Efekt rozprsknutí při zničení ----------
    const pops = [];
    function spawnPop(x, y, color) {
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 80 + Math.random() * 220;
        pops.push({
          x: x, y: y,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
          life: 1, color: color, r: 2 + Math.random() * 4
        });
      }
    }
    function updatePops(dt) {
      for (let i = pops.length - 1; i >= 0; i--) {
        const p = pops[i];
        p.vy += 900 * dt;
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.life -= dt * 1.6;
        if (p.life <= 0) pops.splice(i, 1);
      }
    }

    // ---------- Skóre ----------
    function updateScore() {
      let tallest = 0;
      for (const b of bodies) {
        const top = floorY() - (b.y - HALF);
        if (top > tallest) tallest = top;
      }
      const height = Math.max(0, Math.round(tallest / (2 * HALF)));
      scoreEl.innerHTML = 'Tesserakty: ' + bodies.length + ' &middot; Výška: ' + height;
    }

    // ---------- Render ----------
    function drawTesseract(b, time) {
      const spinT = spin ? time : 0;
      const axw = spinT * 0.55 + b.phase;
      const ayw = spinT * 0.32 + b.phase * 0.7;
      const azw = spinT * 0.18;
      const ry = spinT * 0.25 + b.phase * 0.3;

      const pts = new Array(16);
      for (let i = 0; i < 16; i++) {
        pts[i] = project(VERTS[i], axw, ayw, azw, ry, SIZE, b.x, b.y);
      }

      // hrany se stínováním podle hloubky (vzdálenější jsou tlumenější)
      ctx.lineCap = 'round';
      for (const e of EDGES) {
        const a = pts[e[0]], c = pts[e[1]];
        const depth = (a.depth + c.depth) / 2;
        const shade = Math.max(0.25, Math.min(1, 0.65 + depth * 0.45));
        ctx.globalAlpha = shade;
        ctx.strokeStyle = b.color;
        ctx.lineWidth = 1 + Math.max(0, depth) * 1.6;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(c.x, c.y);
        ctx.stroke();
      }
      // vrcholy jako světélkující body
      for (let i = 0; i < 16; i++) {
        const p = pts[i];
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = Math.max(0.35, Math.min(1, 0.6 + p.depth * 0.4));
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function draw(time) {
      ctx.clearRect(0, 0, W, H);

      // podlaha
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, floorY(), W, H - floorY());

      // tesserakty
      for (const b of bodies) drawTesseract(b, time);

      // částice z ničení
      for (const p of pops) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ---------- Smyčka s pevným krokem ----------
    let last = performance.now();
    let acc = 0;
    function loop(now) {
      let frame = (now - last) / 1000;
      last = now;
      if (frame > 0.1) frame = 0.1;
      acc += frame;
      let steps = 0;
      pendingImpact = 0;
      while (acc >= STEP && steps < 8) { step(STEP); acc -= STEP; steps++; }
      if (pendingImpact > 200) Sound.impact(pendingImpact);
      updatePops(Math.min(frame, 0.05));
      draw(now / 1000);
      updateScore();
      requestAnimationFrame(loop);
    }

    // ---------- Vstup ----------
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth;
      H = canvas.clientHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      updateScore();
    }
    window.addEventListener('resize', resize);

    let destroyMode = false;
    const modeBtn = document.getElementById('mode');
    const hint = document.getElementById('hint');
    function setMode(destroy) {
      destroyMode = destroy;
      modeBtn.classList.toggle('destroy', destroy);
      modeBtn.textContent = destroy ? '💥 Ničit' : '🧊 Stavět';
      hint.textContent = destroy
        ? 'Klepni na tesserakt a znič ho (pravé tlačítko ničí vždy)'
        : 'Klepni nebo klikni a pusť tesserakt – spadne a naskládá se';
    }
    modeBtn.addEventListener('click', function () { setMode(!destroyMode); });

    const spinBtn = document.getElementById('spin');
    spinBtn.addEventListener('click', function () {
      spin = !spin;
      spinBtn.classList.toggle('off', !spin);
    });

    const soundBtn = document.getElementById('sound');
    soundBtn.addEventListener('click', function () {
      const on = Sound.toggle();
      soundBtn.textContent = on ? '🔊 Zvuk' : '🔇 Ticho';
      soundBtn.classList.toggle('off', !on);
    });

    canvas.addEventListener('pointerdown', function (e) {
      Sound.wake();
      const rect = canvas.getBoundingClientRect();
      const px = e.clientX - rect.left, py = e.clientY - rect.top;
      if (destroyMode || e.button === 2) {
        const b = bodyAt(px, py);
        if (b) destroyBody(b);
      } else {
        addTesseract(px);
      }
    });
    canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });

    document.getElementById('reset').addEventListener('click', function () {
      bodies = [];
      pops.length = 0;
      updateScore();
    });

    resize();
    updateScore();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
