<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Obrana věží – 1 kolo na score</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100%;
      background: radial-gradient(circle at 50% 0%, #1b2a4a 0%, #0a1224 70%);
      font-family: system-ui, -apple-system, sans-serif;
      color: #e8eefc;
      -webkit-user-select: none;
      user-select: none;
      overflow-x: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      min-height: 100vh;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 2px;
      color: #ffd166;
      text-shadow: 0 2px 6px rgba(0,0,0,.5);
    }
    .sub { font-size: 12px; color: #9fb3d9; margin-bottom: 8px; text-align: center; }

    #hud {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 440px;
      margin-bottom: 8px;
    }
    .stat {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 6px 4px;
      text-align: center;
    }
    .stat .lbl { font-size: 10px; color: #9fb3d9; text-transform: uppercase; letter-spacing: .5px; }
    .stat .val { font-size: 18px; font-weight: 700; }
    #money .val { color: #ffd166; }
    #lives .val { color: #ff6b6b; }
    #score .val { color: #7ee787; }

    #wrap { position: relative; }
    canvas {
      background: #0d1730;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      display: block;
      touch-action: none;
    }

    #controls {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 440px;
      margin-top: 10px;
    }
    button {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 8px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 0 #1e40af;
      transition: transform .05s;
    }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e40af; }
    button.go { background: linear-gradient(180deg, #34d399, #10b981); box-shadow: 0 4px 0 #047857; }
    button:disabled { opacity: .45; box-shadow: none; }

    .help { font-size: 12px; color: #9fb3d9; margin-top: 10px; max-width: 440px; text-align: center; line-height: 1.5; }

    #overlay {
      position: absolute; inset: 0;
      background: rgba(6,12,28,.92);
      border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px; gap: 10px;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { font-size: 28px; color: #ffd166; }
    #overlay .big { font-size: 46px; font-weight: 800; color: #7ee787; line-height: 1; }
    #overlay .rec { font-size: 14px; color: #9fb3d9; }
    #overlay .newrec { color: #ffd166; font-weight: 700; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: .4; } }
    #overlay button { max-width: 300px; width: 100%; }
    a { color: #9fb3d9; font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <h1>🏰 Obrana věží</h1>
  <div class="sub">1 kolo · uhraj co nejvíc bodů · zrychlení = víc mincí i skóre</div>

  <div id="hud">
    <div class="stat" id="money"><div class="lbl">Mince</div><div class="val">0</div></div>
    <div class="stat" id="lives"><div class="lbl">Životy</div><div class="val">0</div></div>
    <div class="stat" id="wave"><div class="lbl">Vlna</div><div class="val">0/0</div></div>
    <div class="stat" id="score"><div class="lbl">Skóre</div><div class="val">0</div></div>
  </div>

  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">Obrana věží</h2>
      <div id="ovBody"></div>
      <button id="startBtn" class="go">▶ Start</button>
    </div>
  </div>

  <div id="controls">
    <button id="speedBtn">⏩ Rychlost 1×</button>
    <button id="soundBtn">🔇 Zvuk vyp</button>
  </div>


<script>
(() => {
  const COLS = 7, ROWS = 12;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // --- mapa: rohové body cesty v souřadnicích mřížky ---
  const waypoints = [
    [0,0],[5,0],[5,2],[1,2],[1,4],[5,4],[5,6],[1,6],[1,8],[5,8],[5,10],[3,10],[3,11]
  ];

  // množina políček cesty (nestavitelná)
  const pathSet = new Set();
  for (let i = 0; i < waypoints.length - 1; i++) {
    let [ax,ay] = waypoints[i], [bx,by] = waypoints[i+1];
    const dx = Math.sign(bx-ax), dy = Math.sign(by-ay);
    let x = ax, y = ay;
    pathSet.add(x+','+y);
    while (x !== bx || y !== by) { x += dx; y += dy; pathSet.add(x+','+y); }
  }

  let CELL = 0, OX = 0, OY = 0, path = [];
  function layout() {
    const w = Math.min(window.innerWidth - 20, 440);
    // necháme místo na nadpis, HUD, ovládání a odkaz, ať se vejde na výšku bez scrollu
    const h = window.innerHeight - 200;
    CELL = Math.max(28, Math.min(Math.floor(w / COLS), Math.floor(h / ROWS)));
    canvas.width = CELL * COLS;
    canvas.height = CELL * ROWS;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
    // pixelová cesta (středy rohových políček) pro pohyb nepřátel
    path = waypoints.map(([cx,cy]) => ({ x: cx*CELL + CELL/2, y: cy*CELL + CELL/2 }));
  }

  // --- stav hry ---
  const TOTAL_WAVES = 12;
  let towers, enemies, bullets, particles;
  let money, lives, score, waveNum, running, gameOver;
  let spawnQueue, spawnTimer, betweenTimer, speed = 1;
  let raf = null, last = 0;

  const HIGH_KEY = 'td_highscore';
  let high = parseInt(localStorage.getItem(HIGH_KEY) || '0', 10);

  // --- zvuky (Web Audio, bez externích souborů); defaultně vypnuté ---
  let soundOn = false, audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  // jednoduchý tón s obálkou
  function tone(freq, dur, type, vol) {
    if (!soundOn || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.15, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur);
  }
  let lastShot = 0;
  function sfx(kind) {
    if (!soundOn || !audioCtx) return;
    switch (kind) {
      case 'shoot': {
        // omezíme hustotu výstřelů, ať to neřve
        const now = audioCtx.currentTime;
        if (now - lastShot < 0.05) return;
        lastShot = now;
        tone(880, 0.05, 'square', 0.05);
        break;
      }
      case 'kill': tone(440, 0.1, 'triangle', 0.14); break;
      case 'bosskill': tone(180, 0.35, 'sawtooth', 0.2); break;
      case 'build': tone(330, 0.12, 'sine', 0.18); break;
      case 'leak': tone(140, 0.25, 'sawtooth', 0.18); break;
      case 'win': [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'square',0.16), i*120)); break;
      case 'lose': [330,247,165].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'sawtooth',0.18), i*140)); break;
    }
  }

  function reset() {
    towers = []; enemies = []; bullets = []; particles = [];
    money = 150; lives = 5; score = 0; waveNum = 0;
    running = false; gameOver = false;
    spawnQueue = []; spawnTimer = 0; betweenTimer = 1.0;
    updateHud();
  }

  function buildWave(n) {
    // n = 1..TOTAL_WAVES ; obtížnost roste
    const count = 6 + n * 2;
    const q = [];
    for (let i = 0; i < count; i++) {
      const boss = (n === TOTAL_WAVES && i === count - 1);
      const hp = boss ? 1050 + n*70 : Math.round((23 + n * 13) * (1 + i * 0.04));
      const spd = boss ? 32 : 40 + n * 1.8;
      q.push({ hp, spd, boss });
    }
    return q;
  }

  function updateHud() {
    document.querySelector('#money .val').textContent = money;
    document.querySelector('#lives .val').textContent = lives;
    document.querySelector('#wave .val').textContent = waveNum + '/' + TOTAL_WAVES;
    document.querySelector('#score .val').textContent = score;
  }

  // --- věže ---
  function towerStats(level) {
    return {
      range: (1.4 + level * 0.15) * CELL,
      dmg: 6 + level * 5,
      rate: Math.max(0.18, 0.55 - level * 0.05), // s mezi výstřely
    };
  }
  function cellOf(px, py) {
    const cx = Math.floor(px / CELL), cy = Math.floor(py / CELL);
    if (cx < 0 || cy < 0 || cx >= COLS || cy >= ROWS) return null;
    return { cx, cy };
  }

  function handleTap(px, py) {
    if (gameOver) return;
    const c = cellOf(px, py);
    if (!c) return;
    const key = c.cx + ',' + c.cy;
    // na obsazené políčko ani na cestu stavět nelze
    if (towers.some(t => t.cx === c.cx && t.cy === c.cy)) return;
    if (pathSet.has(key)) return;
    if (money >= 50) {
      money -= 50;
      towers.push({ cx: c.cx, cy: c.cy, x: c.cx*CELL+CELL/2, y: c.cy*CELL+CELL/2, level: 1, cool: 0, angle: 0 });
      flash(c.cx*CELL+CELL/2, c.cy*CELL+CELL/2, '#3b82f6');
      sfx('build');
      updateHud();
    }
  }

  function flash(x, y, color) {
    for (let i = 0; i < 8; i++) {
      const a = Math.random() * Math.PI * 2, s = 40 + Math.random()*60;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4, color });
    }
  }

  // --- herní smyčka ---
  function spawnEnemy(def) {
    enemies.push({ x: path[0].x, y: path[0].y, seg: 0, t: 0, hp: def.hp, maxhp: def.hp, spd: def.spd, boss: def.boss });
  }

  function tick(dt) {
    // spawn
    if (running && !gameOver) {
      if (spawnQueue.length > 0) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) { spawnEnemy(spawnQueue.shift()); spawnTimer = 0.55; }
      } else if (enemies.length === 0) {
        // další vlna nebo konec
        if (waveNum < TOTAL_WAVES) {
          betweenTimer -= dt;
          if (betweenTimer <= 0) {
            waveNum++; spawnQueue = buildWave(waveNum); spawnTimer = 0; betweenTimer = 2.5;
            updateHud();
          }
        } else {
          endGame(true);
        }
      }
    }

    // nepřátelé po cestě
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const a = path[e.seg], b = path[e.seg + 1];
      if (!b) { reachEnd(e, i); continue; }
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      e.t += (e.spd * dt) / len;
      while (e.t >= 1) {
        e.t -= 1; e.seg++;
        if (e.seg >= path.length - 1) { reachEnd(e, i); break; }
      }
      if (enemies[i] !== e) continue;
      const a2 = path[e.seg], b2 = path[e.seg + 1];
      if (b2) { e.x = a2.x + (b2.x - a2.x) * e.t; e.y = a2.y + (b2.y - a2.y) * e.t; }
    }

    // věže střílí
    for (const t of towers) {
      t.cool -= dt;
      const st = towerStats(t.level);
      // cíl: nepřítel nejdál po cestě v dosahu
      let best = null, bestProg = -1;
      for (const e of enemies) {
        const d = Math.hypot(e.x - t.x, e.y - t.y);
        if (d <= st.range) {
          const prog = e.seg + e.t;
          if (prog > bestProg) { bestProg = prog; best = e; }
        }
      }
      if (best) {
        t.angle = Math.atan2(best.y - t.y, best.x - t.x);
        if (t.cool <= 0) {
          t.cool = st.rate;
          bullets.push({ x: t.x, y: t.y, target: best, dmg: st.dmg, spd: 460 });
          sfx('shoot');
        }
      }
    }

    // střely
    for (let i = bullets.length - 1; i >= 0; i--) {
      const bl = bullets[i];
      const e = bl.target;
      if (!e || e.hp <= 0 || enemies.indexOf(e) === -1) { bullets.splice(i,1); continue; }
      const dx = e.x - bl.x, dy = e.y - bl.y, d = Math.hypot(dx, dy);
      const step = bl.spd * dt;
      if (d <= step) {
        e.hp -= bl.dmg;
        flash(e.x, e.y, '#ffd166');
        if (e.hp <= 0) killEnemy(e);
        bullets.splice(i, 1);
      } else {
        bl.x += dx / d * step; bl.y += dy / d * step;
      }
    }

    // částice
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function killEnemy(e) {
    const idx = enemies.indexOf(e);
    if (idx === -1) return;
    enemies.splice(idx, 1);
    const base = e.boss ? 55 : 2 + Math.floor(e.maxhp / 40);
    // mírný bonus za zrychlenou hru (mince i skóre): 2× → ×1.25, 4× → ×1.5
    const mul = speed === 4 ? 1.5 : speed === 2 ? 1.25 : 1;
    money += Math.round(base * mul);
    const scoreBase = e.boss ? 1000 : 10 + Math.floor(e.maxhp / 5);
    score += Math.round(scoreBase * mul);
    sfx(e.boss ? 'bosskill' : 'kill');
    for (let i = 0; i < 12; i++) flash(e.x, e.y, '#ff6b6b');
    updateHud();
  }

  function reachEnd(e, i) {
    enemies.splice(i, 1);
    lives -= e.boss ? 5 : 1;
    sfx('leak');
    if (lives <= 0) { lives = 0; updateHud(); endGame(false); }
    else updateHud();
  }

  function endGame(survived) {
    if (gameOver) return;
    gameOver = true; running = false;
    if (survived) score += lives * 50 + money; // bonus za přežití
    updateHud();
    const isNew = score > high;
    if (isNew) { high = score; localStorage.setItem(HIGH_KEY, String(high)); }
    sfx(survived ? 'win' : 'lose');
    document.getElementById('ovTitle').textContent = survived ? '🎉 Ubránil jsi to!' : '💀 Prolomili obranu';
    document.getElementById('ovBody').innerHTML =
      '<div class="big">' + score + '</div><div class="rec">bodů</div>' +
      (isNew ? '<div class="newrec">🏆 Nový osobní rekord!</div>'
             : '<div class="rec">Tvůj rekord: ' + high + '</div>');
    document.getElementById('startBtn').textContent = '↻ Hrát znovu';
    overlay.classList.remove('hidden');
  }

  // --- vykreslení ---
  function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // pozadí (jemný přechod)
    const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bg.addColorStop(0, '#0e1b38'); bg.addColorStop(1, '#0a1224');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // travnatá stavitelná políčka
    for (let cy = 0; cy < ROWS; cy++) for (let cx = 0; cx < COLS; cx++) {
      if (pathSet.has(cx+','+cy)) continue;
      const x = cx*CELL, y = cy*CELL;
      const g = ctx.createLinearGradient(x, y, x, y+CELL);
      g.addColorStop(0, '#1c3a2c'); g.addColorStop(1, '#152c22');
      ctx.fillStyle = g;
      rrect(x+1.5, y+1.5, CELL-3, CELL-3, CELL*0.18); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.05)'; ctx.lineWidth = 1;
      rrect(x+1.5, y+1.5, CELL-3, CELL-3, CELL*0.18); ctx.stroke();
    }

    // silnice (hladký pruh skrz body cesty)
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.strokeStyle = '#3a2f23'; ctx.lineWidth = CELL*0.82;
    ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.strokeStyle = '#6b5a44'; ctx.lineWidth = CELL*0.62;
    ctx.stroke();
    // přerušovaná středová čára
    ctx.strokeStyle = 'rgba(255,225,160,.35)';
    ctx.lineWidth = Math.max(2, CELL*0.06);
    ctx.setLineDash([CELL*0.25, CELL*0.25]);
    ctx.stroke();
    ctx.setLineDash([]);

    // start (zelený) a cíl (červený) marker se září
    const start = path[0], goal = path[path.length-1];
    ctx.save();
    ctx.shadowColor = '#34d399'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#34d399';
    rrect(start.x-CELL*0.32, start.y-CELL*0.32, CELL*0.64, CELL*0.64, CELL*0.18); ctx.fill();
    ctx.shadowColor = '#ef4444'; ctx.fillStyle = '#ef4444';
    rrect(goal.x-CELL*0.32, goal.y-CELL*0.32, CELL*0.64, CELL*0.64, CELL*0.18); ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.font = 'bold '+(CELL*0.3)+'px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶', start.x, start.y);
    ctx.fillText('🏠', goal.x, goal.y);

    // věže
    for (const t of towers) {
      // podstavec se stínem
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,.45)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
      ctx.fillStyle = '#1e293b';
      ctx.beginPath(); ctx.arc(t.x, t.y, CELL*0.36, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // tělo s přechodem
      const g = ctx.createRadialGradient(t.x-CELL*0.1, t.y-CELL*0.1, CELL*0.05, t.x, t.y, CELL*0.34);
      g.addColorStop(0, '#7db1ff'); g.addColorStop(1, '#2563eb');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(t.x, t.y, CELL*0.3, 0, Math.PI*2); ctx.fill();
      // hlaveň
      ctx.strokeStyle = '#dce8ff'; ctx.lineWidth = CELL*0.13; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(t.x, t.y);
      ctx.lineTo(t.x + Math.cos(t.angle)*CELL*0.34, t.y + Math.sin(t.angle)*CELL*0.34); ctx.stroke();
      // odlesk
      ctx.fillStyle = 'rgba(255,255,255,.5)';
      ctx.beginPath(); ctx.arc(t.x-CELL*0.1, t.y-CELL*0.1, CELL*0.06, 0, Math.PI*2); ctx.fill();
    }

    // nepřátelé
    for (const e of enemies) {
      const r = e.boss ? CELL*0.4 : CELL*0.26;
      ctx.save();
      ctx.shadowColor = e.boss ? '#a855f7' : 'rgba(0,0,0,.4)';
      ctx.shadowBlur = e.boss ? 16 : 5; ctx.shadowOffsetY = e.boss ? 0 : 2;
      const g = ctx.createRadialGradient(e.x-r*0.3, e.y-r*0.3, r*0.2, e.x, e.y, r);
      if (e.boss) { g.addColorStop(0, '#d8b4fe'); g.addColorStop(1, '#7e22ce'); }
      else { g.addColorStop(0, '#ff9d9d'); g.addColorStop(1, '#dc2626'); }
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // očka
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.beginPath(); ctx.arc(e.x-r*0.3, e.y-r*0.1, r*0.16, 0, Math.PI*2);
      ctx.arc(e.x+r*0.3, e.y-r*0.1, r*0.16, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(e.x-r*0.3, e.y-r*0.1, r*0.07, 0, Math.PI*2);
      ctx.arc(e.x+r*0.3, e.y-r*0.1, r*0.07, 0, Math.PI*2); ctx.fill();
      if (e.boss) { // korunka
        ctx.fillStyle = '#ffd166';
        ctx.font = 'bold '+(CELL*0.34)+'px system-ui';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('👑', e.x, e.y - r - CELL*0.18);
      }
      // healthbar (zaoblený, barva podle stavu)
      const w = r*2.1, p = Math.max(0, e.hp/e.maxhp), by = e.y - r - (e.boss ? CELL*0.36 : 8);
      ctx.fillStyle = 'rgba(0,0,0,.5)';
      rrect(e.x-w/2, by, w, 4, 2); ctx.fill();
      ctx.fillStyle = p > 0.5 ? '#7ee787' : p > 0.25 ? '#ffd166' : '#ff6b6b';
      rrect(e.x-w/2, by, w*p, 4, 2); ctx.fill();
    }

    // střely se září
    ctx.save();
    ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#fff3c4';
    for (const bl of bullets) { ctx.beginPath(); ctx.arc(bl.x, bl.y, CELL*0.08, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();

    // částice
    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / 0.4);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function loop(ts) {
    if (!last) last = ts;
    let dt = (ts - last) / 1000; last = ts;
    if (dt > 0.1) dt = 0.1;
    if (running && !gameOver) tick(dt * speed);
    draw();
    raf = requestAnimationFrame(loop);
  }

  // --- vstup ---
  function canvasPos(ev) {
    const r = canvas.getBoundingClientRect();
    const cx = (ev.touches ? ev.touches[0].clientX : ev.clientX) - r.left;
    const cy = (ev.touches ? ev.touches[0].clientY : ev.clientY) - r.top;
    return { x: cx * (canvas.width / r.width), y: cy * (canvas.height / r.height) };
  }
  canvas.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    const p = canvasPos(ev);
    handleTap(p.x, p.y);
  });

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  startBtn.addEventListener('click', () => {
    reset();
    overlay.classList.add('hidden');
    running = true;
    waveNum = 1; spawnQueue = buildWave(1); spawnTimer = 0; betweenTimer = 2.5;
    updateHud();
  });

  document.getElementById('speedBtn').addEventListener('click', (e) => {
    speed = speed === 1 ? 2 : speed === 2 ? 4 : 1;
    e.target.textContent = '⏩ Rychlost ' + speed + '×';
  });

  document.getElementById('soundBtn').addEventListener('click', (e) => {
    soundOn = !soundOn;
    if (soundOn) { initAudio(); tone(660, 0.1, 'sine', 0.15); }
    e.target.textContent = soundOn ? '🔊 Zvuk zap' : '🔇 Zvuk vyp';
  });

  // přepočítáme plochu jen při změně šířky (otočení), ne při schování/zobrazení
  // adresní lišty prohlížeče (ta mění jen výšku a způsobovala blikání)
  let lastW = window.innerWidth;
  window.addEventListener('resize', () => {
    if (Math.abs(window.innerWidth - lastW) < 2) return;
    lastW = window.innerWidth;
    layout();
    reset();
  });

  // init
  layout();
  reset();
  document.getElementById('ovBody').innerHTML =
    '<div class="rec">Postav věže, ubraň ' + TOTAL_WAVES + ' vln a nahraj rekord.</div>' +
    '<div class="rec" style="margin-top:6px">🏆 Tvůj rekord: ' + high + '</div>';
  raf = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
