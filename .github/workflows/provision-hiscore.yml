name: Provision Pxplore high score bucket

# Jednorázové založení free key-value kyblíku na kvdb.io pro globální
# žebříček Pxplore. Spouští se ručně; pokud už je URL v configu vyplněná,
# nic nedělá. Vzniklou URL commitne do pxplore/hiscore-config.js.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create kvdb.io bucket and commit its URL
        run: |
          set -uo pipefail
          # self-test kyblíku: zápis, čtení, výpis (vše s vypsáním celé odpovědi)
          test_bucket() {
            B="$1"
            W=$(curl -sS -m 20 -w '|%{http_code}' -X POST "https://kvdb.io/${B}/selftest" -d 'selftest' || true)
            echo "kyblík ${B}: zápis -> ${W}"
            case "$W" in *'|200'|*'|201') ;; *) return 1 ;; esac
            R=$(curl -sS -m 20 -w '|%{http_code}' "https://kvdb.io/${B}/selftest" || true)
            echo "kyblík ${B}: čtení -> ${R}"
            case "$R" in 'selftest|200') ;; *) return 1 ;; esac
            L=$(curl -sS -m 20 -w '|%{http_code}' "https://kvdb.io/${B}/?values=true&format=json" || true)
            echo "kyblík ${B}: výpis -> ${L}"
            case "$L" in *'|200') ;; *) return 1 ;; esac
            curl -sS -X DELETE "https://kvdb.io/${B}/selftest" >/dev/null 2>&1 || true
            return 0
          }
          # kandidáti: kyblík z configu + dříve založené kyblíky
          CURRENT=$(grep -o "https://kvdb.io/[A-Za-z0-9]*" pxplore/hiscore-config.js | sed 's|.*/||' || true)
          WORKING=""
          for B in ${CURRENT} 8ZtB9o7uHw1ddaoLoPzdjo CvkSYQDgTM9v7DwUSEUiSp; do
            if test_bucket "$B"; then WORKING="$B"; break; fi
          done
          # žádný nefunguje – zkus založit čerstvý
          if [ -z "$WORKING" ]; then
            for DATA in 'email=pxplore-hiscore@mailinator.com' 'email=pxplore@example.org'; do
              RESP=$(curl -sS -m 20 -w '\n%{http_code}' -X POST https://kvdb.io -d "$DATA" || true)
              CODE=$(printf '%s' "$RESP" | tail -n 1)
              BODY=$(printf '%s' "$RESP" | sed '$d' | tr -d '[:space:]')
              echo "Založení (data='$DATA') -> HTTP $CODE, tělo: $BODY"
              if { [ "$CODE" = "200" ] || [ "$CODE" = "201" ]; } && printf '%s' "$BODY" | grep -Eq '^[A-Za-z0-9]{8,40}$'; then
                if test_bucket "$BODY"; then WORKING="$BODY"; break; fi
              fi
              sleep 3
            done
          fi
          if [ -z "$WORKING" ]; then
            echo "Nenašel se žádný funkční kyblík, viz výpisy výše."
            exit 1
          fi
          echo "Funkční kyblík: ${WORKING}"
          if [ "$WORKING" = "$CURRENT" ]; then
            echo "Config už na něj ukazuje, hotovo."
            exit 0
          fi
          {
            echo "// URL globálního žebříčku (kvdb.io) – vygenerováno workflow provision-hiscore."
            echo "// Hra funguje i bez ní; postup hráče je vždy primárně v jeho zařízení."
            echo "window.PXPLORE_HISCORE_URL = 'https://kvdb.io/${WORKING}';"
          } > pxplore/hiscore-config.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pxplore/hiscore-config.js
          git commit -m "Pxplore: nastavit URL globálního žebříčku"
          git push
