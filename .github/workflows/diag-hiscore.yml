name: Diag Pxplore hiscore CORS

# Dočasná diagnostika: otestuje kandidátní free úložiště pro žebříček
# z pohledu prohlížeče (CORS hlavičky, anonymní založení).
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Probe candidate storages
        run: |
          set +e
          O='Origin: https://jakub-klima.github.io'

          echo "===== extendsclass json-storage ====="
          R=$(curl -sS -m 20 -X POST https://json.extendsclass.com/bin -H 'Content-Type: application/json' -d '{}' || true)
          echo "create: $R"
          ID=$(printf '%s' "$R" | grep -o '"id" *: *"[^"]*"' | head -1 | grep -o '"[^"]*"$' | tr -d '"')
          if [ -n "$ID" ]; then
            U="https://json.extendsclass.com/bin/$ID"
            echo "-- GET $U --"
            curl -isS -m 20 -H "$O" "$U" | head -25
            echo "-- OPTIONS PUT --"
            curl -isS -m 20 -X OPTIONS -H "$O" -H 'Access-Control-Request-Method: PUT' -H 'Access-Control-Request-Headers: content-type' "$U" | head -25
          fi

          echo "===== getpantry.cloud ====="
          curl -isS -m 20 -X POST https://getpantry.cloud/apiv1/pantry -H 'Content-Type: application/json' -d '{"name":"pxplore","description":"t"}' | head -25

          echo "===== npoint.io ====="
          curl -isS -m 20 -X POST https://www.npoint.io/documents -H 'Content-Type: application/json' -d '{"contents":"{}"}' | head -25

          echo "===== dreamlo ====="
          curl -sS -m 20 -L https://www.dreamlo.com/new | grep -oE '(dreamlo.com)?/lb/[A-Za-z0-9_-]{8,}' | sort -u | head -6
          echo "-- CORS na čtení --"
          curl -isS -m 20 -H "$O" "https://www.dreamlo.com/lb/nonexistent/json" | head -15

          echo "===== textdb.online ====="
          echo "-- update --"
          curl -isS -m 20 -H "$O" "https://textdb.online/update/?key=pxplore-diag-42x&value=ahoj" | head -20
          echo "-- read --"
          curl -isS -m 20 -H "$O" "https://textdb.online/pxplore-diag-42x" | head -20
          exit 0
