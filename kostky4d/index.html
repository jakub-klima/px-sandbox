<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stavba věže 4D – skládání tesseraktů</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: linear-gradient(#1b2735 0%, #090a0f 100%);
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }
    body { display: flex; flex-direction: column; }
    #game { flex: 1 1 auto; width: 100%; min-height: 0; display: block; }
    #hud {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    #hud h1 { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
    #hud p { font-size: 13px; opacity: .75; margin-top: 4px; }
    #score { font-size: 15px; margin-top: 6px; opacity: .9; }
    #controls {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: rgba(9,10,15,.85);
      border-top: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 -6px 18px rgba(0,0,0,.35);
      flex-wrap: wrap;
    }
    #controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 22px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 14px;
      backdrop-filter: blur(6px);
      cursor: pointer;
    }
    #controls button:active { background: rgba(255,255,255,.25); }
    #mode.destroy {
      background: rgba(231,76,60,.85);
      box-shadow: 0 0 16px rgba(231,76,60,.6);
    }
    #sound.off { opacity: .55; }
    #spin.off { opacity: .55; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <h1>🧊 Postav věž 4D</h1>
    <p id="hint">Klepni nebo klikni na sloupec a umísti tesserakt</p>
    <div id="score">Tesserakty: 0 &middot; Výška: 0</div>
  </div>
  <div id="controls">
    <button id="mode">🧊 Stavět</button>
    <button id="spin">🌀 Rotace 4D</button>
    <button id="sound">🔊 Zvuk</button>
    <button id="reset">Vyčistit</button>
  </div>

  <script>
  (function () {
    'use strict';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // ---------- Konfigurace ----------
    const COL_W = 108;        // šířka sloupce (px)
    const CELL_H = 86;        // výška jedné buňky věže (px)
    const SIZE = 30;          // velikost tesseraktu (px)
    const DIST4 = 2.6;        // vzdálenost projekce 4D -> 3D
    const DIST3 = 4.2;        // vzdálenost projekce 3D -> 2D
    const COLORS = ['#e74c3c','#f39c12','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e84393'];

    let W, H, DPR;
    let columns = [];         // pole sloupců, každý je pole tesseraktů (zdola nahoru)
    let colCount = 0;
    let uid = 0;
    let spin = true;          // probíhá 4D rotace?

    // ---------- Zvuky (syntetizované přes Web Audio, bez externích souborů) ----------
    const Sound = (function () {
      let actx = null, enabled = true;
      function ensure() {
        if (!actx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) actx = new AC();
        }
        if (actx && actx.state === 'suspended') actx.resume();
        return actx;
      }
      function tone(freq, dur, type, gain, slideTo) {
        if (!enabled || !ensure()) return;
        const t = actx.currentTime;
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = type || 'sine';
        o.frequency.setValueAtTime(freq, t);
        if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g).connect(actx.destination);
        o.start(t); o.stop(t + dur + 0.02);
      }
      function noise(dur, gain) {
        if (!enabled || !ensure()) return;
        const t = actx.currentTime;
        const n = Math.floor(actx.sampleRate * dur);
        const buf = actx.createBuffer(1, n, actx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
        const src = actx.createBufferSource(); src.buffer = buf;
        const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
        const g = actx.createGain(); g.gain.value = gain;
        src.connect(f).connect(g).connect(actx.destination);
        src.start(t);
      }
      return {
        // jemně "zazvonivý" tón – tesserakt se objeví ze 4. rozměru
        place: function () { tone(520, 0.10, 'triangle', 0.10, 760); },
        destroy: function () { noise(0.3, 0.22); tone(150, 0.28, 'sawtooth', 0.10, 40); },
        toggle: function () { enabled = !enabled; if (enabled) ensure(); return enabled; },
        isOn: function () { return enabled; },
        wake: function () { ensure(); }
      };
    })();

    // ---------- Geometrie tesseraktu (4-krychle) ----------
    // 16 vrcholů = všechny kombinace (±1, ±1, ±1, ±1)
    const VERTS = [];
    for (let i = 0; i < 16; i++) {
      VERTS.push([
        (i & 1) ? 1 : -1,
        (i & 2) ? 1 : -1,
        (i & 4) ? 1 : -1,
        (i & 8) ? 1 : -1
      ]);
    }
    // Hrany spojují vrcholy lišící se právě v jedné souřadnici (jeden bit).
    const EDGES = [];
    for (let i = 0; i < 16; i++) {
      for (let j = i + 1; j < 16; j++) {
        const diff = i ^ j;
        if ((diff & (diff - 1)) === 0) EDGES.push([i, j]);   // mocnina dvojky = jeden bit
      }
    }

    // Projekce jednoho 4D vrcholu na 2D plátno s rotací ve 4. rozměru.
    function project(v, axw, ayw, azw, ry, scale, cx, cy) {
      let x = v[0], y = v[1], z = v[2], w = v[3];
      let c, s, t;
      // rotace v rovině XW
      c = Math.cos(axw); s = Math.sin(axw);
      t = x * c - w * s; w = x * s + w * c; x = t;
      // rotace v rovině YW
      c = Math.cos(ayw); s = Math.sin(ayw);
      t = y * c - w * s; w = y * s + w * c; y = t;
      // rotace v rovině ZW
      c = Math.cos(azw); s = Math.sin(azw);
      t = z * c - w * s; w = z * s + w * c; z = t;
      // perspektivní projekce 4D -> 3D
      const k4 = DIST4 / (DIST4 - w);
      x *= k4; y *= k4; z *= k4;
      // jemná rotace v 3D kolem osy Y, ať je vidět hloubka
      c = Math.cos(ry); s = Math.sin(ry);
      t = x * c - z * s; z = x * s + z * c; x = t;
      // perspektivní projekce 3D -> 2D
      const k3 = DIST3 / (DIST3 - z);
      return {
        x: cx + x * scale * k3,
        y: cy + y * scale * k3,
        depth: z
      };
    }

    // ---------- Stav věže ----------
    function rebuildColumns() {
      const next = Math.max(1, Math.floor(W / COL_W));
      const old = columns;
      columns = [];
      for (let i = 0; i < next; i++) columns.push(old[i] || []);
      colCount = next;
    }

    function colCenterX(col) {
      const total = colCount * COL_W;
      const left = (W - total) / 2;
      return left + col * COL_W + COL_W / 2;
    }
    function floorY() { return H - 24; }

    function addTesseract(col) {
      if (col < 0 || col >= colCount) return;
      columns[col].push({
        id: uid++,
        color: COLORS[uid % COLORS.length],
        phase: Math.random() * Math.PI * 2,   // odlišný počátek rotace
        born: performance.now()
      });
      Sound.place();
      updateScore();
    }

    function destroyTop(col) {
      if (col < 0 || col >= colCount) return;
      const stack = columns[col];
      if (!stack.length) return;
      const t = stack.pop();
      const lvl = stack.length;
      spawnPop(colCenterX(col), floorY() - (lvl + 0.5) * CELL_H, t.color);
      Sound.destroy();
      updateScore();
    }

    function columnAt(px) {
      const total = colCount * COL_W;
      const left = (W - total) / 2;
      const col = Math.floor((px - left) / COL_W);
      return (col >= 0 && col < colCount) ? col : -1;
    }

    // ---------- Efekt rozprsknutí při zničení ----------
    const pops = [];
    function spawnPop(x, y, color) {
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 80 + Math.random() * 220;
        pops.push({
          x: x, y: y,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
          life: 1, color: color, r: 2 + Math.random() * 4
        });
      }
    }
    function updatePops(dt) {
      for (let i = pops.length - 1; i >= 0; i--) {
        const p = pops[i];
        p.vy += 900 * dt;
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.life -= dt * 1.6;
        if (p.life <= 0) pops.splice(i, 1);
      }
    }

    // ---------- Skóre ----------
    function updateScore() {
      let count = 0, tallest = 0;
      for (const stack of columns) {
        count += stack.length;
        if (stack.length > tallest) tallest = stack.length;
      }
      scoreEl.innerHTML = 'Tesserakty: ' + count + ' &middot; Výška: ' + tallest;
    }

    // ---------- Render ----------
    function drawTesseract(t, cx, cy, time) {
      const spinT = spin ? time : 0;
      const axw = spinT * 0.55 + t.phase;
      const ayw = spinT * 0.32 + t.phase * 0.7;
      const azw = spinT * 0.18;
      const ry = spinT * 0.25 + t.phase * 0.3;

      const pts = new Array(16);
      for (let i = 0; i < 16; i++) {
        pts[i] = project(VERTS[i], axw, ayw, azw, ry, SIZE, cx, cy);
      }

      // hrany se stínováním podle hloubky (vzdálenější jsou tlumenější)
      ctx.lineCap = 'round';
      for (const e of EDGES) {
        const a = pts[e[0]], b = pts[e[1]];
        const depth = (a.depth + b.depth) / 2;            // -1..+1 přibližně
        const shade = Math.max(0.25, Math.min(1, 0.65 + depth * 0.45));
        ctx.globalAlpha = shade;
        ctx.strokeStyle = t.color;
        ctx.lineWidth = 1 + Math.max(0, depth) * 1.6;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      // vrcholy jako světélkující body
      ctx.globalAlpha = 1;
      for (let i = 0; i < 16; i++) {
        const p = pts[i];
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = Math.max(0.35, Math.min(1, 0.6 + p.depth * 0.4));
        ctx.beginPath();
        ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function draw(time) {
      ctx.clearRect(0, 0, W, H);

      // podlaha
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      ctx.fillRect(0, floorY(), W, H - floorY());

      // naznačené sloupce (vodicí linky)
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let c = 0; c <= colCount; c++) {
        const total = colCount * COL_W;
        const x = (W - total) / 2 + c * COL_W;
        ctx.beginPath();
        ctx.moveTo(x, 40);
        ctx.lineTo(x, floorY());
        ctx.stroke();
      }

      // tesserakty zdola nahoru v každém sloupci
      for (let c = 0; c < colCount; c++) {
        const cx = colCenterX(c);
        const stack = columns[c];
        for (let lvl = 0; lvl < stack.length; lvl++) {
          const cy = floorY() - (lvl + 0.5) * CELL_H;
          drawTesseract(stack[lvl], cx, cy, time);
        }
      }

      // částice z ničení
      for (const p of pops) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ---------- Smyčka ----------
    let last = performance.now();
    function loop(now) {
      let frame = (now - last) / 1000;
      last = now;
      if (frame > 0.1) frame = 0.1;
      updatePops(frame);
      draw(now / 1000);
      requestAnimationFrame(loop);
    }

    // ---------- Vstup ----------
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth;
      H = canvas.clientHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      rebuildColumns();
      updateScore();
    }
    window.addEventListener('resize', resize);

    let destroyMode = false;
    const modeBtn = document.getElementById('mode');
    const hint = document.getElementById('hint');
    function setMode(destroy) {
      destroyMode = destroy;
      modeBtn.classList.toggle('destroy', destroy);
      modeBtn.textContent = destroy ? '💥 Ničit' : '🧊 Stavět';
      hint.textContent = destroy
        ? 'Klepni na sloupec a sundej horní tesserakt (pravé tlačítko ničí vždy)'
        : 'Klepni nebo klikni na sloupec a umísti tesserakt';
    }
    modeBtn.addEventListener('click', function () { setMode(!destroyMode); });

    const spinBtn = document.getElementById('spin');
    spinBtn.addEventListener('click', function () {
      spin = !spin;
      spinBtn.classList.toggle('off', !spin);
    });

    const soundBtn = document.getElementById('sound');
    soundBtn.addEventListener('click', function () {
      const on = Sound.toggle();
      soundBtn.textContent = on ? '🔊 Zvuk' : '🔇 Ticho';
      soundBtn.classList.toggle('off', !on);
    });

    canvas.addEventListener('pointerdown', function (e) {
      Sound.wake();
      const rect = canvas.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const col = columnAt(px);
      if (col === -1) return;
      if (destroyMode || e.button === 2) destroyTop(col);
      else addTesseract(col);
    });
    canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });

    document.getElementById('reset').addEventListener('click', function () {
      for (let c = 0; c < colCount; c++) columns[c] = [];
      pops.length = 0;
      updateScore();
    });

    resize();
    updateScore();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
