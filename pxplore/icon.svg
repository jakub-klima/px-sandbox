<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#312822"/>
      <stop offset=".55" stop-color="#1c1712"/>
      <stop offset="1" stop-color="#120e0a"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".46" r=".55">
      <stop offset="0" stop-color="#e8c34a" stop-opacity=".33"/>
      <stop offset=".6" stop-color="#e8c34a" stop-opacity=".10"/>
      <stop offset="1" stop-color="#e8c34a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset=".5" stop-color="#caa84a"/>
      <stop offset="1" stop-color="#8a6d1a"/>
    </linearGradient>
    <radialGradient id="jewel" cx=".38" cy=".34" r=".8">
      <stop offset="0" stop-color="#fff3c4"/>
      <stop offset=".45" stop-color="#e8c34a"/>
      <stop offset="1" stop-color="#8a6d1a"/>
    </radialGradient>
    <!-- jeden paprsek růžice mířící na sever: světlá a stinná polovina -->
    <g id="ray">
      <polygon points="0,-186 24,-26 0,0" fill="#8a6d1a"/>
      <polygon points="0,-186 -24,-26 0,0" fill="#ffe08a"/>
    </g>
    <g id="rayShort">
      <polygon points="0,-186 24,-26 0,0" fill="#5c4a22"/>
      <polygon points="0,-186 -24,-26 0,0" fill="#c9a94e"/>
    </g>
    <!-- čtyřcípá jiskra -->
    <path id="spark" d="M0,-14 L3.4,-3.4 L14,0 L3.4,3.4 L0,14 L-3.4,3.4 L-14,0 L-3.4,-3.4 Z" fill="#ffe9a8"/>
  </defs>

  <!-- podklad se zaoblenými rohy a jemným zlatým rámem -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="11" y="11" width="490" height="490" rx="106" fill="none" stroke="#6b5836" stroke-width="6" opacity=".85"/>
  <rect x="23" y="23" width="466" height="466" rx="95" fill="none" stroke="#caa84a" stroke-width="2.5" opacity=".5"/>

  <!-- teplá záře uprostřed -->
  <circle cx="256" cy="246" r="215" fill="url(#glow)"/>

  <!-- kompasový kruh se stupnicí -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="url(#ring)" stroke-width="13"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="#6b5836" stroke-width="3" opacity=".7"/>
  <g stroke="#caa84a" stroke-width="5" opacity=".8" stroke-linecap="round">
    <line x1="256" y1="70"  x2="256" y2="92"/>
    <line x1="256" y1="420" x2="256" y2="442"/>
    <line x1="70"  y1="256" x2="92"  y2="256"/>
    <line x1="420" y1="256" x2="442" y2="256"/>
  </g>

  <!-- růžice: krátké diagonální paprsky vzadu, hlavní vpředu -->
  <g transform="translate(256,256)">
    <g transform="rotate(45)   scale(.58)"><use href="#rayShort"/></g>
    <g transform="rotate(135)  scale(.58)"><use href="#rayShort"/></g>
    <g transform="rotate(225)  scale(.58)"><use href="#rayShort"/></g>
    <g transform="rotate(315)  scale(.58)"><use href="#rayShort"/></g>
    <g transform="rotate(90)"><use href="#ray"/></g>
    <g transform="rotate(180)"><use href="#ray"/></g>
    <g transform="rotate(270)"><use href="#ray"/></g>
    <!-- sever = červená střelka objevitele -->
    <g>
      <polygon points="0,-186 24,-26 0,0" fill="#7a201c"/>
      <polygon points="0,-186 -24,-26 0,0" fill="#e05545"/>
    </g>
  </g>

  <!-- středový klenot -->
  <circle cx="256" cy="256" r="40" fill="#191410" stroke="#caa84a" stroke-width="6"/>
  <circle cx="256" cy="256" r="21" fill="url(#jewel)"/>

  <!-- jiskry objevu -->
  <use href="#spark" transform="translate(392,108) scale(1.25)"/>
  <use href="#spark" transform="translate(122,384) scale(.85)" opacity=".8"/>
  <use href="#spark" transform="translate(418,332) scale(.6)" opacity=".7"/>
</svg>
