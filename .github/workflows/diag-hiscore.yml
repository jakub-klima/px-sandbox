name: Diag Pxplore hiscore CORS

# Dočasná diagnostika: 2. kolo – detailní test npoint.io a textdb.online.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Probe npoint and textdb
        run: |
          set +e
          O='Origin: https://jakub-klima.github.io'

          echo "===== npoint.io ====="
          R=$(curl -sS -m 20 -X POST https://www.npoint.io/documents -H 'Content-Type: application/json' -d '{"contents":"{}"}')
          TOKEN=$(printf '%s' "$R" | grep -o '"token":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "token: $TOKEN"
          if [ -n "$TOKEN" ]; then
            echo "-- POST update přes api.npoint.io --"
            curl -isS -m 20 -X POST "https://api.npoint.io/$TOKEN" -H "$O" -H 'Content-Type: application/json' -d '{"p1":{"n":"Test","s":3,"t":1}}' | head -20
            echo "-- GET s Origin --"
            curl -isS -m 20 -H "$O" "https://api.npoint.io/$TOKEN" | head -20
            echo "-- OPTIONS preflight pro POST --"
            curl -isS -m 20 -X OPTIONS -H "$O" -H 'Access-Control-Request-Method: POST' -H 'Access-Control-Request-Headers: content-type' "https://api.npoint.io/$TOKEN" | head -20
          fi

          echo "===== textdb.online ====="
          echo "-- POST update (form data, JSON hodnota) --"
          curl -isS -m 20 -X POST -H "$O" "https://textdb.online/update/?key=pxplore-diag-42x" --data-urlencode 'value={"p1":{"n":"Test","s":3,"t":1}}' | head -12
          echo "-- čtení --"
          curl -sS -m 20 "https://textdb.online/pxplore-diag-42x"; echo
          echo "-- velká hodnota (60 kB) --"
          BIG=$(head -c 60000 /dev/zero | tr '\0' 'x')
          curl -sS -m 30 -X POST "https://textdb.online/update/?key=pxplore-diag-42x" --data-urlencode "value=$BIG" | head -3; echo
          echo "-- délka po zápisu: --"
          curl -sS -m 20 "https://textdb.online/pxplore-diag-42x" | wc -c
          echo "-- čtení neexistujícího klíče --"
          curl -isS -m 20 "https://textdb.online/pxplore-neexistuje-99z" | head -8
          echo "-- úklid --"
          curl -sS -m 20 -X POST "https://textdb.online/update/?key=pxplore-diag-42x" --data-urlencode 'value=' | head -3
          exit 0
