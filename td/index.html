<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Obrana věží – 1 kolo na score</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100%;
      background: radial-gradient(circle at 50% 0%, #1b2a4a 0%, #0a1224 70%);
      font-family: system-ui, -apple-system, sans-serif;
      color: #e8eefc;
      -webkit-user-select: none;
      user-select: none;
      overflow-x: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      min-height: 100vh;
    }
    h1 {
      font-size: 22px;
      margin-bottom: 2px;
      color: #ffd166;
      text-shadow: 0 2px 6px rgba(0,0,0,.5);
    }
    .sub { font-size: 12px; color: #9fb3d9; margin-bottom: 8px; text-align: center; }

    #hud {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 440px;
      margin-bottom: 8px;
    }
    .stat {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 6px 4px;
      text-align: center;
    }
    .stat .lbl { font-size: 10px; color: #9fb3d9; text-transform: uppercase; letter-spacing: .5px; }
    .stat .val { font-size: 18px; font-weight: 700; }
    #money .val { color: #ffd166; }
    #lives .val { color: #ff6b6b; transition: color .2s; }
    #score .val { color: #7ee787; }
    #lives.critical .val { animation: pulse .6s infinite; color: #ff2d2d; }

    #waveInfo { font-size: 12px; color: #9fb3d9; min-height: 16px; margin-bottom: 6px; text-align: center; }

    #towerBar {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 440px;
      margin-bottom: 8px;
    }
    .ttype {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 1px;
      background: rgba(255,255,255,.06);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 5px 4px;
      color: #e8eefc;
      cursor: pointer;
      box-shadow: none;
      transition: transform .05s, border-color .1s;
    }
    .ttype:active { transform: translateY(1px); }
    .ttype .icon { font-size: 17px; line-height: 1; }
    .ttype .name { font-size: 9px; color: #9fb3d9; }
    .ttype .price { font-size: 11px; font-weight: 700; color: #ffd166; }
    .ttype.active { border-color: #7ee787; background: rgba(126,231,135,.12); }
    .ttype:disabled { opacity: .4; }

    #wrap { position: relative; }
    canvas {
      background: #0d1730;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.45);
      display: block;
      touch-action: none;
    }

    #controls {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 440px;
      margin-top: 10px;
    }
    button {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 8px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 0 #1e40af;
      transition: transform .05s;
    }
    button:active { transform: translateY(2px); box-shadow: 0 2px 0 #1e40af; }
    button.go { background: linear-gradient(180deg, #34d399, #10b981); box-shadow: 0 4px 0 #047857; }
    button:disabled { opacity: .45; box-shadow: none; }

    #towerPanel {
      width: 100%;
      max-width: 440px;
      margin-top: 10px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 8px 10px;
    }
    #towerPanel.hidden { display: none; }
    #towerPanel .tpHead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    #towerPanel .tpHead b { font-size: 14px; color: #ffd166; }
    #towerPanel .tpHead .lvl { font-size: 12px; color: #9fb3d9; }
    #towerPanel .tpStats { font-size: 11px; color: #9fb3d9; margin-bottom: 6px; }
    #tpMode {
      width: 100%; font-size: 12px; padding: 7px 4px; margin-bottom: 6px;
      background: linear-gradient(180deg, #818cf8, #6366f1); box-shadow: 0 3px 0 #4338ca;
    }
    #towerPanel .tpBtns { display: flex; gap: 6px; }
    #towerPanel .tpBtns button { flex: 1; font-size: 12px; padding: 8px 4px; box-shadow: 0 3px 0 #1e40af; }
    #towerPanel #tpUpgrade { background: linear-gradient(180deg, #34d399, #10b981); box-shadow: 0 3px 0 #047857; }
    #towerPanel #tpSell { background: linear-gradient(180deg, #f87171, #ef4444); box-shadow: 0 3px 0 #b91c1c; }
    #towerPanel #tpClose { flex: 0 0 40px; background: linear-gradient(180deg, #475569, #334155); box-shadow: 0 3px 0 #1e293b; }

    #nextWaveBtn {
      width: 100%; max-width: 440px; margin-top: 10px;
      background: linear-gradient(180deg, #fbbf24, #f59e0b); box-shadow: 0 4px 0 #b45309;
    }
    #nextWaveBtn.hidden { display: none; }

    .help { font-size: 12px; color: #9fb3d9; margin-top: 10px; max-width: 440px; text-align: center; line-height: 1.5; }

    #overlay {
      position: absolute; inset: 0;
      background: rgba(6,12,28,.92);
      border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px; gap: 10px;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { font-size: 28px; color: #ffd166; }
    #overlay .big { font-size: 46px; font-weight: 800; color: #7ee787; line-height: 1; }
    #overlay .rec { font-size: 14px; color: #9fb3d9; }
    #overlay .newrec { color: #ffd166; font-weight: 700; animation: pulse 1s infinite; }
    @keyframes pulse { 50% { opacity: .4; } }
    #overlay button { max-width: 300px; width: 100%; flex: none; }
    a { color: #9fb3d9; font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <h1>🏰 Obrana věží</h1>
  <div class="sub">1 kolo · uhraj co nejvíc bodů · zrychlení = víc mincí i skóre</div>

  <div id="hud">
    <div class="stat" id="money"><div class="lbl">Mince</div><div class="val">0</div></div>
    <div class="stat" id="lives"><div class="lbl">Životy</div><div class="val">0</div></div>
    <div class="stat" id="wave"><div class="lbl">Vlna</div><div class="val">0/0</div></div>
    <div class="stat" id="score"><div class="lbl">Skóre</div><div class="val">0</div></div>
  </div>
  <div id="waveInfo"></div>

  <div id="towerBar">
    <button class="ttype active" id="tt_basic" data-type="basic">
      <span class="icon">🗼</span><span class="name">Základní</span><span class="price">50</span>
    </button>
    <button class="ttype" id="tt_cannon" data-type="cannon">
      <span class="icon">💥</span><span class="name">Dělo</span><span class="price">90</span>
    </button>
    <button class="ttype" id="tt_frost" data-type="frost">
      <span class="icon">❄️</span><span class="name">Mráz</span><span class="price">70</span>
    </button>
  </div>

  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="overlay">
      <h2 id="ovTitle">Obrana věží</h2>
      <div id="ovBody"></div>
      <button id="startBtn" class="go">▶ Start</button>
    </div>
  </div>

  <div id="towerPanel" class="hidden">
    <div class="tpHead"><b id="tpName">Věž</b><span class="lvl" id="tpLevel">Úroveň 1</span></div>
    <div class="tpStats" id="tpStats"></div>
    <button id="tpMode"></button>
    <div class="tpBtns">
      <button id="tpUpgrade">⬆ Vylepšit</button>
      <button id="tpSell">💰 Prodat</button>
      <button id="tpClose">✕</button>
    </div>
  </div>

  <button id="nextWaveBtn" class="hidden">⏭ Vyvolat vlnu dřív (+bonus)</button>

  <div id="controls">
    <button id="speedBtn">⏩ Rychlost 1×</button>
    <button id="soundBtn">🔇 Zvuk vyp</button>
  </div>


<script>
(() => {
  const COLS = 7, ROWS = 12;
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // --- mapa: rohové body cesty v souřadnicích mřížky ---
  const waypoints = [
    [0,0],[5,0],[5,2],[1,2],[1,4],[5,4],[5,6],[1,6],[1,8],[5,8],[5,10],[3,10],[3,11]
  ];

  // množina políček cesty (nestavitelná)
  const pathSet = new Set();
  for (let i = 0; i < waypoints.length - 1; i++) {
    let [ax,ay] = waypoints[i], [bx,by] = waypoints[i+1];
    const dx = Math.sign(bx-ax), dy = Math.sign(by-ay);
    let x = ax, y = ay;
    pathSet.add(x+','+y);
    while (x !== bx || y !== by) { x += dx; y += dy; pathSet.add(x+','+y); }
  }

  let CELL = 0, OX = 0, OY = 0, path = [];
  let tileDecor = {}, roadTicks = [], vignetteGrad = null;
  let animT = 0;

  // jednoduchý deterministický "hash" pro stabilní texturu dlaždic (bez blikání mezi snímky)
  function hash2(a, b) {
    let h = (a * 374761393 + b * 668265263) ^ (a * 3266489917);
    h = (h ^ (h >>> 13)) * 1274126177;
    return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
  }

  function layout() {
    const w = Math.min(window.innerWidth - 20, 440);
    // necháme místo na nadpis, HUD, ovládání a odkaz, ať se vejde na výšku bez scrollu
    const h = window.innerHeight - 200;
    CELL = Math.max(28, Math.min(Math.floor(w / COLS), Math.floor(h / ROWS)));
    canvas.width = CELL * COLS;
    canvas.height = CELL * ROWS;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
    // pixelová cesta (středy rohových políček) pro pohyb nepřátel
    path = waypoints.map(([cx,cy]) => ({ x: cx*CELL + CELL/2, y: cy*CELL + CELL/2 }));

    // stabilní textura trávy (specky + občas keřík/kamínek), generuje se jen při layoutu
    tileDecor = {};
    for (let cy = 0; cy < ROWS; cy++) for (let cx = 0; cx < COLS; cx++) {
      if (pathSet.has(cx+','+cy)) continue;
      const specks = [];
      for (let i = 0; i < 5; i++) {
        const r1 = hash2(cx*7+i, cy*13+i), r2 = hash2(cx*11+i, cy*5+i), r3 = hash2(cx*3+i, cy*17+i);
        specks.push({ x: (r1-0.5)*CELL*0.7, y: (r2-0.5)*CELL*0.7, r: CELL*(0.025+r3*0.035) });
      }
      const deco = hash2(cx*29, cy*31);
      tileDecor[cx+','+cy] = { specks, kind: deco < 0.12 ? 'bush' : deco < 0.2 ? 'rock' : null };
    }

    // cachovaná dlažba cesty (kolmé "spáry" pro kamenný vzhled)
    roadTicks = [];
    for (let i = 0; i < path.length - 1; i++) {
      const a = path[i], b = path[i+1];
      const segLen = Math.hypot(b.x-a.x, b.y-a.y);
      const angle = Math.atan2(b.y-a.y, b.x-a.x);
      const step = CELL * 0.5;
      for (let d = step*0.5; d < segLen; d += step) {
        roadTicks.push({ x: a.x + (b.x-a.x)*(d/segLen), y: a.y + (b.y-a.y)*(d/segLen), angle });
      }
    }

    vignetteGrad = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, canvas.height*0.32,
      canvas.width/2, canvas.height/2, canvas.height*0.72
    );
    vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
    vignetteGrad.addColorStop(1, 'rgba(0,0,0,.4)');
  }

  // --- stav hry ---
  const TOTAL_WAVES = 12;
  let towers, enemies, bullets, particles, floaters;
  let money, lives, score, waveNum, running, gameOver;
  let spawnQueue, spawnTimer, betweenTimer, speed = 1, countdown = 0;
  let raf = null, last = 0;
  let buildType = 'basic';
  let selectedTower = null;
  let hitFlash = 0;

  // --- cílení věží ---
  const TARGET_MODES = ['first', 'hp', 'near'];
  const TARGET_NAMES = { first: '🏁 Cíl: Postup', hp: '❤️ Cíl: Nejsilnější', near: '🎯 Cíl: Nejbližší' };

  // --- typy věží ---
  const MAX_LEVEL = 4;
  const TOWER_TYPES = {
    basic: {
      name: 'Základní', icon: '🗼', cost: 50,
      rangeBase: 1.4, rangeStep: 0.15,
      dmgBase: 6, dmgStep: 5,
      rateBase: 0.55, rateStep: 0.05, rateMin: 0.18,
      color1: '#7db1ff', color2: '#2563eb', bulletColor: '#fff3c4',
      splash: 0, slow: 0, slowDur: 0,
    },
    cannon: {
      name: 'Dělo', icon: '💥', cost: 90,
      rangeBase: 1.15, rangeStep: 0.12,
      dmgBase: 14, dmgStep: 9,
      rateBase: 0.95, rateStep: 0.08, rateMin: 0.45,
      color1: '#ffcb8a', color2: '#ea580c', bulletColor: '#ffb703',
      splash: 0.9, slow: 0, slowDur: 0,
    },
    frost: {
      name: 'Mráz', icon: '❄️', cost: 70,
      rangeBase: 1.3, rangeStep: 0.13,
      dmgBase: 3, dmgStep: 2,
      rateBase: 0.5, rateStep: 0.04, rateMin: 0.22,
      color1: '#a5f3fc', color2: '#0891b2', bulletColor: '#cffafe',
      splash: 0, slow: 0.45, slowDur: 1.4,
    },
  };

  const HIGH_KEY = 'td_highscore';
  let high = parseInt(localStorage.getItem(HIGH_KEY) || '0', 10);
  const WAVE_KEY = 'td_highwave';
  let highWave = parseInt(localStorage.getItem(WAVE_KEY) || '0', 10);

  // --- zvuky (Web Audio, bez externích souborů); defaultně zapnuté,
  // volba se pamatuje v localStorage ---
  const SOUND_KEY = 'td_sound';
  let soundOn = localStorage.getItem(SOUND_KEY) !== '0'; // default zapnuto
  let audioCtx = null;
  function initAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  // jednoduchý tón s obálkou
  function tone(freq, dur, type, vol) {
    if (!soundOn || !audioCtx) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.15, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + dur);
  }
  let lastShot = 0;
  function sfx(kind) {
    if (!soundOn || !audioCtx) return;
    switch (kind) {
      case 'shoot': {
        // omezíme hustotu výstřelů, ať to neřve
        const now = audioCtx.currentTime;
        if (now - lastShot < 0.05) return;
        lastShot = now;
        tone(880, 0.05, 'square', 0.05);
        break;
      }
      case 'kill': tone(440, 0.1, 'triangle', 0.14); break;
      case 'bosskill': tone(180, 0.35, 'sawtooth', 0.2); break;
      case 'build': tone(330, 0.12, 'sine', 0.18); break;
      case 'leak': tone(140, 0.25, 'sawtooth', 0.18); break;
      case 'win': [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'square',0.16), i*120)); break;
      case 'lose': [330,247,165].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'sawtooth',0.18), i*140)); break;
    }
  }

  function reset() {
    towers = []; enemies = []; bullets = []; particles = []; floaters = [];
    money = 150; lives = 5; score = 0; waveNum = 0;
    running = false; gameOver = false;
    spawnQueue = []; spawnTimer = 0; betweenTimer = 1.0; countdown = 0;
    hitFlash = 0;
    deselectTower();
    document.getElementById('waveInfo').textContent = '';
    document.getElementById('nextWaveBtn').classList.add('hidden');
    updateHud();
    updateTowerBar();
  }

  const ENEMY_ICON = { normal: '🔴', fast: '🟢', armored: '⚙️', elite: '💀' };
  function waveComposition(q) {
    const counts = {};
    let boss = false;
    for (const e of q) { if (e.boss) { boss = true; continue; } counts[e.type] = (counts[e.type]||0)+1; }
    let s = Object.keys(counts).map(t => ENEMY_ICON[t] + '×' + counts[t]).join('  ');
    if (boss) s += '  👑 BOSS';
    return s;
  }

  function buildWave(n) {
    // n = 1..TOTAL_WAVES ; obtížnost roste, postupně přibývají nové typy nepřátel
    const count = 6 + n * 2;
    const q = [];
    // každou 4. vlnu (kromě finální s bossem) uzavírá mini-boss
    const eliteWave = n % 4 === 0 && n !== TOTAL_WAVES;
    for (let i = 0; i < count; i++) {
      const boss = (n === TOTAL_WAVES && i === count - 1);
      const elite = (!boss && eliteWave && i === count - 1);
      const baseHp = Math.round((25 + n * 14) * (1 + i * 0.04));
      const baseSpd = 40 + n * 1.8;
      let type = 'normal', hp = baseHp, spd = baseSpd, armor = 0;
      if (!boss && !elite) {
        const fastChance = Math.min(0.5, 0.08 * n);
        const armorChance = n >= 4 ? Math.min(0.35, 0.05 * (n - 3)) : 0;
        const r = Math.random();
        if (r < armorChance) type = 'armored';
        else if (r < armorChance + fastChance) type = 'fast';
      }
      if (boss) { hp = 1100 + n*73; spd = 32; }
      else if (elite) { type = 'elite'; hp = Math.round(400 + n * 55); spd = 36; armor = 4 + Math.floor(n * 0.6); }
      else if (type === 'fast') { hp = Math.round(baseHp * 0.55); spd = baseSpd * 1.7; }
      else if (type === 'armored') { hp = Math.round(baseHp * 1.6); spd = baseSpd * 0.8; armor = 6 + Math.floor(n * 0.8); }
      q.push({ hp, spd, boss, type, armor });
    }
    return q;
  }

  function updateHud() {
    document.querySelector('#money .val').textContent = money;
    document.querySelector('#lives .val').textContent = lives;
    document.querySelector('#wave .val').textContent = waveNum + '/' + TOTAL_WAVES;
    document.querySelector('#score .val').textContent = score;
    document.getElementById('lives').classList.toggle('critical', lives > 0 && lives <= 2);
    updateTowerBar();
    if (selectedTower) refreshTowerPanel();
  }

  function updateTowerBar() {
    for (const type in TOWER_TYPES) {
      const btn = document.getElementById('tt_' + type);
      if (btn) btn.disabled = money < TOWER_TYPES[type].cost;
    }
  }

  // --- věže ---
  function towerStats(t) {
    const def = TOWER_TYPES[t.type];
    const level = t.level;
    return {
      range: (def.rangeBase + level * def.rangeStep) * CELL,
      dmg: def.dmgBase + level * def.dmgStep,
      rate: Math.max(def.rateMin, def.rateBase - level * def.rateStep),
      splash: def.splash ? def.splash * CELL : 0,
      slow: def.slow || 0,
      slowDur: def.slowDur || 0,
    };
  }
  function upgradeCost(t) {
    return Math.round(TOWER_TYPES[t.type].cost * 0.75 * t.level);
  }
  function sellValue(t) {
    return Math.round(t.spent * 0.6);
  }
  function cellOf(px, py) {
    const cx = Math.floor(px / CELL), cy = Math.floor(py / CELL);
    if (cx < 0 || cy < 0 || cx >= COLS || cy >= ROWS) return null;
    return { cx, cy };
  }

  function handleTap(px, py) {
    if (gameOver) return;
    const c = cellOf(px, py);
    if (!c) return;
    const key = c.cx + ',' + c.cy;
    const existing = towers.find(t => t.cx === c.cx && t.cy === c.cy);
    if (existing) { selectTower(existing); return; }
    if (selectedTower) { deselectTower(); return; }
    if (pathSet.has(key)) return;
    const def = TOWER_TYPES[buildType];
    if (money >= def.cost) {
      money -= def.cost;
      towers.push({ cx: c.cx, cy: c.cy, x: c.cx*CELL+CELL/2, y: c.cy*CELL+CELL/2, type: buildType, level: 1, cool: 0, angle: -Math.PI/2, spent: def.cost, targetMode: 'first', recoil: 0 });
      flash(c.cx*CELL+CELL/2, c.cy*CELL+CELL/2, def.color2);
      sfx('build');
      updateHud();
    }
  }

  // --- výběr věže / panel s vylepšením a prodejem ---
  const towerPanel = document.getElementById('towerPanel');
  function selectTower(t) {
    selectedTower = t;
    refreshTowerPanel();
    towerPanel.classList.remove('hidden');
  }
  function deselectTower() {
    selectedTower = null;
    towerPanel.classList.add('hidden');
  }
  function refreshTowerPanel() {
    if (!selectedTower) return;
    const t = selectedTower, def = TOWER_TYPES[t.type], st = towerStats(t);
    document.getElementById('tpName').textContent = def.icon + ' ' + def.name;
    document.getElementById('tpLevel').textContent = 'Úroveň ' + t.level + (t.level >= MAX_LEVEL ? ' (MAX)' : '');
    let stats = 'Poškození ' + st.dmg + ' · Dostřel ' + Math.round(st.range/CELL*10)/10 + ' · Rychlost ' + (1/st.rate).toFixed(1) + '/s';
    if (st.splash) stats += ' · Splash';
    if (st.slow) stats += ' · Zpomalení';
    document.getElementById('tpStats').textContent = stats;
    document.getElementById('tpMode').textContent = TARGET_NAMES[t.targetMode] + ' (změnit)';
    const upBtn = document.getElementById('tpUpgrade');
    if (t.level >= MAX_LEVEL) {
      upBtn.textContent = '⬆ MAX úroveň';
      upBtn.disabled = true;
    } else {
      const cost = upgradeCost(t);
      upBtn.textContent = '⬆ Vylepšit (' + cost + ')';
      upBtn.disabled = money < cost;
    }
    document.getElementById('tpSell').textContent = '💰 Prodat (' + sellValue(t) + ')';
  }
  document.getElementById('tpUpgrade').addEventListener('click', () => {
    if (!selectedTower || selectedTower.level >= MAX_LEVEL) return;
    const cost = upgradeCost(selectedTower);
    if (money < cost) return;
    money -= cost;
    selectedTower.level++;
    selectedTower.spent += cost;
    flash(selectedTower.x, selectedTower.y, '#7ee787');
    sfx('build');
    updateHud();
    refreshTowerPanel();
  });
  document.getElementById('tpSell').addEventListener('click', () => {
    if (!selectedTower) return;
    money += sellValue(selectedTower);
    const idx = towers.indexOf(selectedTower);
    if (idx !== -1) towers.splice(idx, 1);
    deselectTower();
    updateHud();
  });
  document.getElementById('tpClose').addEventListener('click', deselectTower);
  document.getElementById('tpMode').addEventListener('click', () => {
    if (!selectedTower) return;
    const idx = TARGET_MODES.indexOf(selectedTower.targetMode);
    selectedTower.targetMode = TARGET_MODES[(idx + 1) % TARGET_MODES.length];
    refreshTowerPanel();
  });

  document.querySelectorAll('.ttype').forEach(btn => {
    btn.addEventListener('click', () => {
      buildType = btn.dataset.type;
      document.querySelectorAll('.ttype').forEach(b => b.classList.toggle('active', b === btn));
    });
  });

  function flash(x, y, color) {
    for (let i = 0; i < 8; i++) {
      const a = Math.random() * Math.PI * 2, s = 40 + Math.random()*60;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.4, color });
    }
  }
  function ring(x, y, color, maxR) {
    particles.push({ x, y, ring: true, life: 0.35, maxLife: 0.35, color, maxR: maxR || CELL*0.8 });
  }
  function floatText(x, y, text, color) {
    floaters.push({ x, y, text, color, life: 0.9, maxLife: 0.9 });
  }

  // --- herní smyčka ---
  function spawnEnemy(def) {
    enemies.push({ x: path[0].x, y: path[0].y, seg: 0, t: 0, hp: def.hp, maxhp: def.hp, spd: def.spd, boss: def.boss, type: def.type || 'normal', armor: def.armor || 0, slowTimer: 0, slowMul: 1, hitFlash: 0, seedBob: Math.random()*10 });
  }

  function tick(dt) {
    animT += dt;
    // spawn (až po úvodním odpočtu – během něj jde jen stavět)
    if (running && !gameOver && countdown <= 0) {
      if (spawnQueue.length > 0) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) { spawnEnemy(spawnQueue.shift()); spawnTimer = 0.55; }
      } else if (enemies.length === 0) {
        // další vlna nebo konec
        if (waveNum < TOTAL_WAVES) {
          betweenTimer -= dt;
          if (betweenTimer <= 0) {
            waveNum++; spawnQueue = buildWave(waveNum); spawnTimer = 0; betweenTimer = 2.5;
            document.getElementById('waveInfo').textContent = waveComposition(spawnQueue);
            updateHud();
          }
        } else {
          endGame(true);
        }
      }
    }
    updateNextWaveVisibility();

    // nepřátelé po cestě
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (e.slowTimer > 0) { e.slowTimer -= dt; if (e.slowTimer < 0) e.slowTimer = 0; }
      if (e.hitFlash > 0) { e.hitFlash -= dt*4; if (e.hitFlash < 0) e.hitFlash = 0; }
      const effSpd = e.slowTimer > 0 ? e.spd * e.slowMul : e.spd;
      const a = path[e.seg], b = path[e.seg + 1];
      if (!b) { reachEnd(e, i); continue; }
      const dx = b.x - a.x, dy = b.y - a.y;
      const len = Math.hypot(dx, dy);
      e.t += (effSpd * dt) / len;
      while (e.t >= 1) {
        e.t -= 1; e.seg++;
        if (e.seg >= path.length - 1) { reachEnd(e, i); break; }
      }
      if (enemies[i] !== e) continue;
      const a2 = path[e.seg], b2 = path[e.seg + 1];
      if (b2) { e.x = a2.x + (b2.x - a2.x) * e.t; e.y = a2.y + (b2.y - a2.y) * e.t; }
    }

    // věže střílí
    for (const t of towers) {
      t.cool -= dt;
      if (t.recoil > 0) { t.recoil -= dt*6; if (t.recoil < 0) t.recoil = 0; }
      const st = towerStats(t);
      // cíl podle zvoleného režimu: postup po cestě / nejvíc HP / nejblíž věži
      let best = null, bestVal = -Infinity;
      for (const e of enemies) {
        const d = Math.hypot(e.x - t.x, e.y - t.y);
        if (d <= st.range) {
          const val = t.targetMode === 'hp' ? e.hp : t.targetMode === 'near' ? -d : e.seg + e.t;
          if (val > bestVal) { bestVal = val; best = e; }
        }
      }
      if (best) {
        t.angle = Math.atan2(best.y - t.y, best.x - t.x);
        if (t.cool <= 0) {
          t.cool = st.rate;
          t.recoil = 1;
          const def = TOWER_TYPES[t.type];
          const tipX = t.x + Math.cos(t.angle)*CELL*0.4, tipY = t.y + Math.sin(t.angle)*CELL*0.4;
          bullets.push({ x: tipX, y: tipY, target: best, dmg: st.dmg, spd: 460, splash: st.splash, slow: st.slow, slowDur: st.slowDur, color: def.bulletColor });
          for (let i = 0; i < 3; i++) {
            const a = t.angle + (Math.random()-0.5)*0.6;
            particles.push({ x: tipX, y: tipY, vx: Math.cos(a)*90, vy: Math.sin(a)*90, life: 0.12, color: def.bulletColor });
          }
          sfx('shoot');
        }
      }
    }

    // střely
    for (let i = bullets.length - 1; i >= 0; i--) {
      const bl = bullets[i];
      const e = bl.target;
      if (!e || e.hp <= 0 || enemies.indexOf(e) === -1) { bullets.splice(i,1); continue; }
      const dx = e.x - bl.x, dy = e.y - bl.y, d = Math.hypot(dx, dy);
      const step = bl.spd * dt;
      if (d <= step) {
        hitEnemy(e, bl);
        flash(e.x, e.y, '#ffd166');
        if (bl.splash > 0) {
          ring(e.x, e.y, bl.color || '#ffb703', bl.splash);
          for (const other of enemies) {
            if (other === e || other.hp <= 0) continue;
            if (Math.hypot(other.x - e.x, other.y - e.y) <= bl.splash) hitEnemy(other, bl, 0.6);
          }
          flash(e.x, e.y, bl.color || '#ffb703');
        }
        bullets.splice(i, 1);
      } else {
        bl.x += dx / d * step; bl.y += dy / d * step;
      }
    }

    // částice
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (!p.ring) { p.x += p.vx * dt; p.y += p.vy * dt; }
      if (p.life <= 0) particles.splice(i, 1);
    }
    // plovoucí texty (+mince, skóre)
    for (let i = floaters.length - 1; i >= 0; i--) {
      const f = floaters[i];
      f.life -= dt; f.y -= dt * 26;
      if (f.life <= 0) floaters.splice(i, 1);
    }
  }

  function hitEnemy(e, bl, dmgMul) {
    const dmg = Math.max(1, Math.round(bl.dmg * (dmgMul || 1)) - e.armor);
    e.hp -= dmg;
    e.hitFlash = 1;
    if (bl.slow > 0) { e.slowTimer = bl.slowDur; e.slowMul = bl.slow; }
    if (e.hp <= 0) killEnemy(e);
  }

  function killEnemy(e) {
    const idx = enemies.indexOf(e);
    if (idx === -1) return;
    enemies.splice(idx, 1);
    const base = e.boss ? 55 : 2 + Math.floor(e.maxhp / 40);
    // mírný bonus za zrychlenou hru (mince i skóre): 2× → ×1.25, 4× → ×1.5
    const mul = speed === 4 ? 1.5 : speed === 2 ? 1.25 : 1;
    const coinGain = Math.round(base * mul);
    money += coinGain;
    const scoreBase = e.boss ? 1000 : 10 + Math.floor(e.maxhp / 5);
    score += Math.round(scoreBase * mul);
    sfx(e.boss || e.type === 'elite' ? 'bosskill' : 'kill');
    for (let i = 0; i < 12; i++) flash(e.x, e.y, '#ff6b6b');
    ring(e.x, e.y, e.boss ? '#a855f7' : e.type === 'elite' ? '#f59e0b' : '#ff6b6b', CELL*(e.boss ? 1.1 : 0.6));
    floatText(e.x, e.y - CELL*0.3, '+' + coinGain, '#ffd166');
    updateHud();
  }

  function reachEnd(e, i) {
    enemies.splice(i, 1);
    lives -= e.boss ? 5 : e.type === 'elite' ? 3 : 1;
    hitFlash = Math.min(1, hitFlash + 0.35);
    sfx('leak');
    if (lives <= 0) { lives = 0; updateHud(); endGame(false); }
    else updateHud();
  }

  function updateNextWaveVisibility() {
    const can = running && !gameOver && countdown <= 0 && enemies.length === 0 &&
      spawnQueue.length === 0 && waveNum > 0 && waveNum < TOTAL_WAVES && betweenTimer > 0;
    document.getElementById('nextWaveBtn').classList.toggle('hidden', !can);
  }

  function endGame(survived) {
    if (gameOver) return;
    gameOver = true; running = false;
    if (survived) score += lives * 50 + money; // bonus za přežití
    updateHud();
    document.getElementById('nextWaveBtn').classList.add('hidden');
    const isNew = score > high;
    if (isNew) { high = score; localStorage.setItem(HIGH_KEY, String(high)); }
    const reachedWave = survived ? TOTAL_WAVES : waveNum;
    const isNewWave = reachedWave > highWave;
    if (isNewWave) { highWave = reachedWave; localStorage.setItem(WAVE_KEY, String(highWave)); }
    sfx(survived ? 'win' : 'lose');
    document.getElementById('ovTitle').textContent = survived ? '🎉 Ubránil jsi to!' : '💀 Prolomili obranu';
    document.getElementById('ovBody').innerHTML =
      '<div class="big">' + score + '</div><div class="rec">bodů · vlna ' + reachedWave + '/' + TOTAL_WAVES + '</div>' +
      (isNew ? '<div class="newrec">🏆 Nový osobní rekord!</div>'
             : '<div class="rec">Tvůj rekord: ' + high + '</div>') +
      (isNewWave ? '<div class="newrec">🌊 Nejdelší postup!</div>' : '');
    document.getElementById('startBtn').textContent = '↻ Hrát znovu';
    overlay.classList.remove('hidden');
  }

  // --- vykreslení ---
  function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.arcTo(x+w, y, x+w, y+h, r);
    ctx.arcTo(x+w, y+h, x, y+h, r);
    ctx.arcTo(x, y+h, x, y, r);
    ctx.arcTo(x, y, x+w, y, r);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    if (hitFlash > 0) {
      const s = hitFlash * 8;
      ctx.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s);
    }

    // pozadí (jemný přechod)
    const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bg.addColorStop(0, '#0e1b38'); bg.addColorStop(1, '#0a1224');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // travnatá stavitelná políčka s texturou (specky + keříky/kamínky)
    for (let cy = 0; cy < ROWS; cy++) for (let cx = 0; cx < COLS; cx++) {
      if (pathSet.has(cx+','+cy)) continue;
      const x = cx*CELL, y = cy*CELL, key = cx+','+cy;
      const g = ctx.createLinearGradient(x, y, x, y+CELL);
      g.addColorStop(0, '#204025'); g.addColorStop(1, '#152c1f');
      ctx.fillStyle = g;
      rrect(x+1.5, y+1.5, CELL-3, CELL-3, CELL*0.18); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.05)'; ctx.lineWidth = 1;
      rrect(x+1.5, y+1.5, CELL-3, CELL-3, CELL*0.18); ctx.stroke();
      const deco = tileDecor[key];
      if (deco) {
        const cxp = x + CELL/2, cyp = y + CELL/2;
        ctx.fillStyle = 'rgba(120,200,140,.18)';
        for (const s of deco.specks) {
          ctx.beginPath(); ctx.arc(cxp + s.x, cyp + s.y, s.r, 0, Math.PI*2); ctx.fill();
        }
        if (deco.kind === 'bush') {
          ctx.fillStyle = '#2f5d3a';
          ctx.beginPath();
          ctx.arc(cxp-CELL*0.1, cyp+CELL*0.06, CELL*0.13, 0, Math.PI*2);
          ctx.arc(cxp+CELL*0.11, cyp+CELL*0.06, CELL*0.15, 0, Math.PI*2);
          ctx.arc(cxp, cyp-CELL*0.05, CELL*0.15, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,.08)';
          ctx.beginPath(); ctx.arc(cxp-CELL*0.04, cyp-CELL*0.1, CELL*0.06, 0, Math.PI*2); ctx.fill();
        } else if (deco.kind === 'rock') {
          ctx.fillStyle = '#5b6472';
          ctx.beginPath();
          ctx.ellipse(cxp, cyp+CELL*0.08, CELL*0.16, CELL*0.1, 0, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,255,255,.12)';
          ctx.beginPath(); ctx.ellipse(cxp-CELL*0.04, cyp+CELL*0.04, CELL*0.06, CELL*0.03, 0, 0, Math.PI*2); ctx.fill();
        }
      }
    }

    // silnice (hladký pruh skrz body cesty) s kamennou dlažbou
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.strokeStyle = '#2b2318'; ctx.lineWidth = CELL*0.86;
    ctx.beginPath(); ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
    ctx.stroke();
    ctx.strokeStyle = '#4a3c2a'; ctx.lineWidth = CELL*0.74;
    ctx.stroke();
    const roadGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    roadGrad.addColorStop(0, '#8a7355'); roadGrad.addColorStop(1, '#6b5a44');
    ctx.strokeStyle = roadGrad; ctx.lineWidth = CELL*0.62;
    ctx.stroke();
    // kolmé spáry dlažby (cachované, bez blikání)
    ctx.strokeStyle = 'rgba(0,0,0,.14)'; ctx.lineWidth = Math.max(1, CELL*0.035);
    for (const rt of roadTicks) {
      const nx = Math.cos(rt.angle+Math.PI/2)*CELL*0.29, ny = Math.sin(rt.angle+Math.PI/2)*CELL*0.29;
      ctx.beginPath(); ctx.moveTo(rt.x-nx, rt.y-ny); ctx.lineTo(rt.x+nx, rt.y+ny); ctx.stroke();
    }
    // přerušovaná středová čára
    ctx.strokeStyle = 'rgba(255,225,160,.35)';
    ctx.lineWidth = Math.max(2, CELL*0.06);
    ctx.setLineDash([CELL*0.25, CELL*0.25]);
    ctx.stroke();
    ctx.setLineDash([]);

    // start (portál) a cíl (hradní brána)
    const start = path[0], goal = path[path.length-1];
    const pulse = 0.5 + 0.5*Math.sin(animT*3);
    ctx.save();
    ctx.translate(start.x, start.y); ctx.rotate(animT*0.6);
    ctx.strokeStyle = 'rgba(52,211,153,.55)'; ctx.lineWidth = Math.max(1.5, CELL*0.045);
    ctx.setLineDash([CELL*0.14, CELL*0.1]);
    ctx.beginPath(); ctx.arc(0, 0, CELL*0.38, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    ctx.save();
    ctx.shadowColor = '#34d399'; ctx.shadowBlur = 10 + pulse*8;
    ctx.fillStyle = '#1a3b2c';
    ctx.beginPath(); ctx.arc(start.x, start.y, CELL*0.3, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();
    ctx.fillStyle = '#7ee787';
    ctx.font = 'bold '+(CELL*0.28)+'px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('▶', start.x, start.y);

    // hrad u cíle: základna + cimbuří + praporek
    ctx.save();
    ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 12;
    const gw = CELL*0.62, gh = CELL*0.5, gx = goal.x-gw/2, gy = goal.y-gh*0.55;
    const wallGrad = ctx.createLinearGradient(gx, gy, gx, gy+gh);
    wallGrad.addColorStop(0, '#8a8f9c'); wallGrad.addColorStop(1, '#5c6270');
    ctx.fillStyle = wallGrad;
    rrect(gx, gy, gw, gh, CELL*0.05); ctx.fill();
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(gx + i*gw/4 + gw*0.02, gy - CELL*0.09, gw/4 - gw*0.04, CELL*0.1);
    }
    ctx.fillStyle = '#3a3f4a';
    rrect(goal.x-CELL*0.09, gy+gh-CELL*0.2, CELL*0.18, CELL*0.2, CELL*0.03); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#fca5a5';
    ctx.font = 'bold '+(CELL*0.16)+'px system-ui';
    ctx.fillText('🚩', goal.x, gy - CELL*0.16);

    // dosah vybrané věže
    if (selectedTower) {
      const st = towerStats(selectedTower);
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,.35)';
      ctx.fillStyle = 'rgba(255,255,255,.06)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(selectedTower.x, selectedTower.y, st.range, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      if (st.splash) {
        ctx.strokeStyle = 'rgba(249,115,22,.5)';
        ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.arc(selectedTower.x, selectedTower.y, st.splash, 0, Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();
    }

    // věže
    for (const t of towers) {
      const def = TOWER_TYPES[t.type];
      const recoil = t.recoil || 0;
      // podstavec se stínem
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,.45)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
      ctx.fillStyle = '#1e293b';
      ctx.beginPath(); ctx.arc(t.x, t.y, CELL*0.37, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      if (t === selectedTower) {
        ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(t.x, t.y, CELL*0.42, 0, Math.PI*2); ctx.stroke();
      }
      const bodyR = CELL*0.3;
      const g = ctx.createRadialGradient(t.x-CELL*0.1, t.y-CELL*0.1, CELL*0.05, t.x, t.y, bodyR);
      g.addColorStop(0, def.color1); g.addColorStop(1, def.color2);

      if (t.type === 'cannon') {
        // šestiúhelníková mohutná základna
        ctx.fillStyle = g;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = -Math.PI/2 + i*Math.PI/3;
          const px = t.x + Math.cos(a)*bodyR*1.05, py = t.y + Math.sin(a)*bodyR*1.05;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 1.5; ctx.stroke();
        // krátká silná hlaveň s odskokem při výstřelu
        const barLen = CELL*0.3*(1 - recoil*0.35);
        ctx.strokeStyle = '#3f2f1f'; ctx.lineWidth = CELL*0.2; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(t.x, t.y);
        ctx.lineTo(t.x + Math.cos(t.angle)*barLen, t.y + Math.sin(t.angle)*barLen); ctx.stroke();
        ctx.strokeStyle = '#6b4a30'; ctx.lineWidth = CELL*0.13;
        ctx.beginPath(); ctx.moveTo(t.x, t.y);
        ctx.lineTo(t.x + Math.cos(t.angle)*barLen, t.y + Math.sin(t.angle)*barLen); ctx.stroke();
        if (recoil > 0.5) {
          ctx.fillStyle = 'rgba(255,178,3,' + ((recoil-0.5)*1.6) + ')';
          ctx.beginPath(); ctx.arc(t.x + Math.cos(t.angle)*barLen, t.y + Math.sin(t.angle)*barLen, CELL*0.12, 0, Math.PI*2); ctx.fill();
        }
      } else if (t.type === 'frost') {
        // krystalická věž (diamant s facetami)
        ctx.save();
        ctx.translate(t.x, t.y); ctx.rotate(Math.PI/4 + Math.sin(animT*1.5)*0.05);
        ctx.fillStyle = g;
        rrect(-bodyR*0.78, -bodyR*0.78, bodyR*1.56, bodyR*1.56, bodyR*0.22); ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(-bodyR*0.78,0); ctx.lineTo(bodyR*0.78,0);
        ctx.moveTo(0,-bodyR*0.78); ctx.lineTo(0,bodyR*0.78); ctx.stroke();
        ctx.restore();
        // ledový paprsek
        const barLen = CELL*0.32*(1 - recoil*0.25);
        ctx.strokeStyle = '#e0f7fa'; ctx.lineWidth = CELL*0.09; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(t.x, t.y);
        ctx.lineTo(t.x + Math.cos(t.angle)*barLen, t.y + Math.sin(t.angle)*barLen); ctx.stroke();
      } else {
        // základní: válcová věž s cimbuřím
        ctx.fillStyle = '#1e293b';
        for (let i = 0; i < 8; i++) {
          const a = i * Math.PI/4;
          ctx.save();
          ctx.translate(t.x + Math.cos(a)*bodyR*0.98, t.y + Math.sin(a)*bodyR*0.98);
          ctx.rotate(a);
          ctx.fillRect(-CELL*0.05, -CELL*0.05, CELL*0.1, CELL*0.1);
          ctx.restore();
        }
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(t.x, t.y, bodyR*0.86, 0, Math.PI*2); ctx.fill();
        // hlaveň s odskokem
        const barLen = CELL*0.34*(1 - recoil*0.35);
        ctx.strokeStyle = '#dce8ff'; ctx.lineWidth = CELL*0.13; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(t.x, t.y);
        ctx.lineTo(t.x + Math.cos(t.angle)*barLen, t.y + Math.sin(t.angle)*barLen); ctx.stroke();
      }
      // odlesk
      ctx.fillStyle = 'rgba(255,255,255,.5)';
      ctx.beginPath(); ctx.arc(t.x-CELL*0.1, t.y-CELL*0.1, CELL*0.06, 0, Math.PI*2); ctx.fill();
      // úroveň (tečky)
      for (let lv = 0; lv < t.level; lv++) {
        ctx.fillStyle = '#ffd166';
        ctx.beginPath(); ctx.arc(t.x - CELL*0.18 + lv*CELL*0.12, t.y + CELL*0.3, CELL*0.045, 0, Math.PI*2); ctx.fill();
      }
    }

    // nepřátelé
    for (const e of enemies) {
      const r = e.boss ? CELL*0.4 : e.type === 'elite' ? CELL*0.34 : e.type === 'armored' ? CELL*0.3 : CELL*0.26;
      const bob = Math.sin(animT*5 + e.seedBob) * CELL*0.02 * (e.boss ? 1.4 : 1);
      const ex = e.x, ey = e.y + bob;
      ctx.save();
      ctx.shadowColor = e.boss ? '#a855f7' : e.type === 'elite' ? '#f59e0b' : 'rgba(0,0,0,.4)';
      ctx.shadowBlur = e.boss ? 16 : e.type === 'elite' ? 13 : 5; ctx.shadowOffsetY = (e.boss || e.type === 'elite') ? 0 : 2;
      const g = ctx.createRadialGradient(ex-r*0.3, ey-r*0.3, r*0.2, ex, ey, r);
      if (e.boss) { g.addColorStop(0, '#d8b4fe'); g.addColorStop(1, '#7e22ce'); }
      else if (e.type === 'elite') { g.addColorStop(0, '#fcd34d'); g.addColorStop(1, '#78350f'); }
      else if (e.type === 'fast') { g.addColorStop(0, '#bbf7d0'); g.addColorStop(1, '#16a34a'); }
      else if (e.type === 'armored') { g.addColorStop(0, '#cbd5e1'); g.addColorStop(1, '#475569'); }
      else { g.addColorStop(0, '#ff9d9d'); g.addColorStop(1, '#dc2626'); }
      ctx.fillStyle = g;

      if (e.type === 'armored') {
        // šestiúhelníková pancéřová deska
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const a = -Math.PI/2 + i*Math.PI/3;
          const px = ex + Math.cos(a)*r, py = ey + Math.sin(a)*r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.3)'; ctx.lineWidth = 1.5; ctx.stroke();
      } else if (e.type === 'fast') {
        // protáhlá kapka ve směru pohybu
        const mvAngle = Math.atan2(
          (path[Math.min(e.seg+1, path.length-1)].y - path[e.seg].y),
          (path[Math.min(e.seg+1, path.length-1)].x - path[e.seg].x)
        );
        ctx.save();
        ctx.translate(ex, ey); ctx.rotate(mvAngle);
        ctx.beginPath(); ctx.ellipse(0, 0, r*1.25, r*0.82, 0, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        // rychlostní čárky za ním
        ctx.strokeStyle = 'rgba(187,247,208,.5)'; ctx.lineWidth = 2;
        for (let i = 1; i <= 2; i++) {
          ctx.beginPath();
          ctx.moveTo(ex - Math.cos(mvAngle)*r*(1+i*0.6), ey - Math.sin(mvAngle)*r*(1+i*0.6) - i*2);
          ctx.lineTo(ex - Math.cos(mvAngle)*r*(1.7+i*0.6), ey - Math.sin(mvAngle)*r*(1.7+i*0.6) - i*2);
          ctx.stroke();
        }
      } else {
        ctx.beginPath(); ctx.arc(ex, ey, r, 0, Math.PI*2); ctx.fill();
        if (e.type === 'elite' || e.boss) {
          // trny okolo těla
          ctx.fillStyle = e.boss ? '#7e22ce' : '#78350f';
          const spikes = e.boss ? 8 : 6;
          for (let i = 0; i < spikes; i++) {
            const a = i * Math.PI*2/spikes + animT*0.4;
            ctx.beginPath();
            ctx.moveTo(ex + Math.cos(a)*r*0.85, ey + Math.sin(a)*r*0.85);
            ctx.lineTo(ex + Math.cos(a-0.12)*r*1.25, ey + Math.sin(a-0.12)*r*1.25);
            ctx.lineTo(ex + Math.cos(a+0.12)*r*1.25, ey + Math.sin(a+0.12)*r*1.25);
            ctx.closePath(); ctx.fill();
          }
        } else {
          // rožky pro obyčejné nepřátele
          ctx.fillStyle = '#991b1b';
          ctx.beginPath();
          ctx.moveTo(ex-r*0.5, ey-r*0.6); ctx.lineTo(ex-r*0.15, ey-r*0.95); ctx.lineTo(ex-r*0.02, ey-r*0.45);
          ctx.moveTo(ex+r*0.5, ey-r*0.6); ctx.lineTo(ex+r*0.15, ey-r*0.95); ctx.lineTo(ex+r*0.02, ey-r*0.45);
          ctx.fill();
        }
      }
      ctx.restore();
      // záblesk zásahu
      if (e.hitFlash > 0) {
        ctx.save();
        ctx.globalAlpha = e.hitFlash * 0.7;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(ex, ey, r, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
      if (e.slowTimer > 0) {
        ctx.save();
        ctx.strokeStyle = 'rgba(165,243,252,.9)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(ex, ey, r+2, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
      // očka
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.beginPath(); ctx.arc(ex-r*0.3, ey-r*0.1, r*0.16, 0, Math.PI*2);
      ctx.arc(ex+r*0.3, ey-r*0.1, r*0.16, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(ex-r*0.3, ey-r*0.1, r*0.07, 0, Math.PI*2);
      ctx.arc(ex+r*0.3, ey-r*0.1, r*0.07, 0, Math.PI*2); ctx.fill();
      if (e.boss) { // korunka
        ctx.fillStyle = '#ffd166';
        ctx.font = 'bold '+(CELL*0.34)+'px system-ui';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('👑', ex, ey - r - CELL*0.18);
      } else if (e.type === 'elite') { // lebka mini-bosse
        ctx.fillStyle = '#fca5a5';
        ctx.font = 'bold '+(CELL*0.3)+'px system-ui';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('💀', ex, ey - r - CELL*0.16);
      }
      // healthbar (zaoblený, barva podle stavu)
      const w = r*2.1, p = Math.max(0, e.hp/e.maxhp), by = ey - r - (e.boss ? CELL*0.36 : e.type === 'elite' ? CELL*0.32 : 8);
      ctx.fillStyle = 'rgba(0,0,0,.5)';
      rrect(ex-w/2, by, w, 4, 2); ctx.fill();
      ctx.fillStyle = p > 0.5 ? '#7ee787' : p > 0.25 ? '#ffd166' : '#ff6b6b';
      rrect(ex-w/2, by, w*p, 4, 2); ctx.fill();
    }

    // střely se září
    for (const bl of bullets) {
      ctx.save();
      const c = bl.color || '#fff3c4';
      ctx.shadowColor = c; ctx.shadowBlur = 8;
      ctx.fillStyle = c;
      ctx.beginPath(); ctx.arc(bl.x, bl.y, CELL*0.08, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // částice
    for (const p of particles) {
      if (p.ring) {
        const t2 = 1 - Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = Math.max(0, 1 - t2) * 0.6;
        ctx.strokeStyle = p.color; ctx.lineWidth = Math.max(1.5, CELL*0.05);
        ctx.beginPath(); ctx.arc(p.x, p.y, p.maxR * t2, 0, Math.PI*2); ctx.stroke();
        continue;
      }
      ctx.globalAlpha = Math.max(0, p.life / 0.4);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // plovoucí texty (+mince)
    for (const f of floaters) {
      const a = Math.max(0, f.life / f.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = f.color;
      ctx.font = 'bold '+(CELL*0.24)+'px system-ui';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,.5)'; ctx.lineWidth = 3;
      ctx.strokeText(f.text, f.x, f.y);
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    // úvodní odpočet 3..2..1 (během něj jde stavět)
    if (running && !gameOver && countdown > 0) {
      const n = Math.ceil(countdown);
      const frac = countdown - Math.floor(countdown); // pro animaci „nádechu“
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.font = 'bold '+(CELL*0.5)+'px system-ui';
      ctx.fillText('Stav věže! 🏗️', canvas.width/2, canvas.height*0.4);
      ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 20;
      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold '+(CELL*1.6*(1.1 - frac*0.25))+'px system-ui';
      ctx.fillText(n, canvas.width/2, canvas.height*0.55);
      ctx.restore();
    }

    if (vignetteGrad) { ctx.fillStyle = vignetteGrad; ctx.fillRect(0, 0, canvas.width, canvas.height); }

    ctx.restore();
    if (hitFlash > 0) {
      ctx.fillStyle = 'rgba(239,68,68,' + (hitFlash*0.35) + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
  }

  function loop(ts) {
    if (!last) last = ts;
    let dt = (ts - last) / 1000; last = ts;
    if (dt > 0.1) dt = 0.1;
    if (hitFlash > 0) { hitFlash -= dt * 2; if (hitFlash < 0) hitFlash = 0; }
    if (running && !gameOver && countdown > 0) countdown -= dt; // odpočet reálným časem
    if (running && !gameOver) tick(dt * speed);
    draw();
    raf = requestAnimationFrame(loop);
  }

  // --- vstup ---
  function canvasPos(ev) {
    const r = canvas.getBoundingClientRect();
    const cx = (ev.touches ? ev.touches[0].clientX : ev.clientX) - r.left;
    const cy = (ev.touches ? ev.touches[0].clientY : ev.clientY) - r.top;
    return { x: cx * (canvas.width / r.width), y: cy * (canvas.height / r.height) };
  }
  canvas.addEventListener('pointerdown', (ev) => {
    ev.preventDefault();
    if (soundOn) initAudio();
    const p = canvasPos(ev);
    handleTap(p.x, p.y);
  });

  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  startBtn.addEventListener('click', () => {
    if (soundOn) initAudio();
    reset();
    overlay.classList.add('hidden');
    running = true;
    countdown = 3; // 3..2..1, během odpočtu už jde stavět
    waveNum = 1; spawnQueue = buildWave(1); spawnTimer = 0; betweenTimer = 2.5;
    document.getElementById('waveInfo').textContent = waveComposition(spawnQueue);
    updateHud();
  });

  document.getElementById('nextWaveBtn').addEventListener('click', () => {
    if (running && !gameOver && countdown <= 0 && enemies.length === 0 && spawnQueue.length === 0 &&
        waveNum > 0 && waveNum < TOTAL_WAVES && betweenTimer > 0) {
      money += Math.round(betweenTimer * 4); // bonus za rychlejší vyvolání vlny
      betweenTimer = 0;
      sfx('build');
      updateHud();
    }
  });

  document.getElementById('speedBtn').addEventListener('click', (e) => {
    speed = speed === 1 ? 2 : speed === 2 ? 4 : 1;
    e.target.textContent = '⏩ Rychlost ' + speed + '×';
  });

  const soundBtn = document.getElementById('soundBtn');
  soundBtn.textContent = soundOn ? '🔊 Zvuk zap' : '🔇 Zvuk vyp';
  soundBtn.addEventListener('click', (e) => {
    soundOn = !soundOn;
    localStorage.setItem(SOUND_KEY, soundOn ? '1' : '0');
    if (soundOn) { initAudio(); tone(660, 0.1, 'sine', 0.15); }
    e.target.textContent = soundOn ? '🔊 Zvuk zap' : '🔇 Zvuk vyp';
  });

  // přepočítáme plochu jen při změně šířky (otočení), ne při schování/zobrazení
  // adresní lišty prohlížeče (ta mění jen výšku a způsobovala blikání)
  let lastW = window.innerWidth;
  window.addEventListener('resize', () => {
    if (Math.abs(window.innerWidth - lastW) < 2) return;
    lastW = window.innerWidth;
    layout();
    reset();
  });

  // init
  layout();
  reset();
  document.getElementById('ovBody').innerHTML =
    '<div class="rec">Postav věže, ubraň ' + TOTAL_WAVES + ' vln a nahraj rekord.</div>' +
    '<div class="rec" style="margin-top:6px">🏆 Tvůj rekord: ' + high + '</div>' +
    (highWave > 0 ? '<div class="rec">🌊 Nejdelší postup: vlna ' + highWave + '/' + TOTAL_WAVES + '</div>' : '');
  raf = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
