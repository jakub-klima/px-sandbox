<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Stavba věže – skládání kostek</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: linear-gradient(#1b2735 0%, #090a0f 100%);
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }
    body { display: flex; flex-direction: column; }
    #game { flex: 1 1 auto; width: 100%; min-height: 0; display: block; }
    #hud {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
    }
    #hud h1 { font-size: 18px; font-weight: 600; letter-spacing: .5px; }
    #hud p { font-size: 13px; opacity: .75; margin-top: 4px; }
    #score { font-size: 15px; margin-top: 6px; opacity: .9; }
    #controls {
      flex: 0 0 auto;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: rgba(9,10,15,.85);
      border-top: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 -6px 18px rgba(0,0,0,.35);
    }
    #controls button {
      padding: 10px 20px;
      border: none;
      border-radius: 22px;
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 14px;
      backdrop-filter: blur(6px);
      cursor: pointer;
    }
    #controls button:active { background: rgba(255,255,255,.25); }
    #mode.destroy {
      background: rgba(231,76,60,.85);
      box-shadow: 0 0 16px rgba(231,76,60,.6);
    }
    #sound.off { opacity: .55; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <h1>🧱 Postav věž</h1>
    <p id="hint">Klepni nebo klikni a umísti kostku</p>
    <div id="score">Kostky: 0 &middot; Výška: 0</div>
  </div>
  <div id="controls">
    <button id="mode">🧱 Stavět</button>
    <button id="sound">🔊 Zvuk</button>
    <button id="reset">Vyčistit</button>
  </div>

  <script>
  (function () {
    'use strict';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    // --- Konfigurace fyziky (impulzní řešič ve stylu Box2D-lite) ---
    const GRAVITY = 1500;          // px/s^2
    const STEP = 1 / 120;          // pevný krok simulace
    const ITER = 20;               // iterace řešiče (vyšší = stabilnější vysoké věže)
    const VMAX = 650;              // mezní rychlost – tlumí náraz padající kostky
    const BETA = 0.2;              // Baumgarte – korekce prolínání skrz rychlost
    const SLOP = 0.05;             // tolerované prolínání
    const BLOCK_W = 64;
    const BLOCK_H = 40;
    const COLORS = ['#e74c3c','#f39c12','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e84393'];

    let W, H, DPR;
    let bodies = [];               // všechna tělesa (dynamická i statická)
    let statics = [];              // podlaha + stěny
    let uid = 1;
    const cache = new Map();       // warm-starting: minulé impulzy podle dvojice těles

    // ---------- Zvuky (syntetizované přes Web Audio, bez externích souborů) ----------
    const Sound = (function () {
      let actx = null, enabled = true;
      function ensure() {
        if (!actx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) actx = new AC();
        }
        if (actx && actx.state === 'suspended') actx.resume();
        return actx;
      }
      function tone(freq, dur, type, gain, slideTo) {
        if (!enabled || !ensure()) return;
        const t = actx.currentTime;
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = type || 'sine';
        o.frequency.setValueAtTime(freq, t);
        if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(gain, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g).connect(actx.destination);
        o.start(t); o.stop(t + dur + 0.02);
      }
      function noise(dur, gain) {
        if (!enabled || !ensure()) return;
        const t = actx.currentTime;
        const n = Math.floor(actx.sampleRate * dur);
        const buf = actx.createBuffer(1, n, actx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2);
        const src = actx.createBufferSource(); src.buffer = buf;
        const f = actx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1400;
        const g = actx.createGain(); g.gain.value = gain;
        src.connect(f).connect(g).connect(actx.destination);
        src.start(t);
      }
      return {
        place: function () { tone(420, 0.08, 'square', 0.10, 580); },
        destroy: function () { noise(0.3, 0.22); tone(150, 0.28, 'sawtooth', 0.10, 40); },
        impact: function (speed) {
          const gain = Math.min(0.16, speed / 1600 * 0.16);
          if (gain < 0.012) return;
          tone(110 + Math.random() * 40, 0.06, 'triangle', gain, 65);
        },
        toggle: function () { enabled = !enabled; if (enabled) ensure(); return enabled; },
        isOn: function () { return enabled; },
        wake: function () { ensure(); }
      };
    })();
    let pendingImpact = 0;

    // ---------- Vektorová matematika ----------
    function rot(x, y, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return { x: x * c - y * s, y: x * s + y * c };
    }

    // ---------- Tuhé těleso (krabice jako konvexní mnohoúhelník) ----------
    function makeBox(x, y, hw, hh, opts) {
      opts = opts || {};
      const verts = [
        { x: -hw, y: -hh }, { x: hw, y: -hh },
        { x: hw, y: hh },  { x: -hw, y: hh }
      ];
      const normals = [];
      for (let i = 0; i < verts.length; i++) {
        const a = verts[i], b = verts[(i + 1) % verts.length];
        const ex = b.x - a.x, ey = b.y - a.y;
        const len = Math.hypot(ex, ey);
        normals.push({ x: ey / len, y: -ex / len });
      }
      const isStatic = !!opts.isStatic;
      const w = hw * 2, h = hh * 2;
      const density = 0.0012;
      const mass = isStatic ? 0 : density * w * h;
      const inertia = isStatic ? 0 : mass * (w * w + h * h) / 12;
      return {
        id: uid++,
        pos: { x: x, y: y }, angle: opts.angle || 0,
        v: { x: 0, y: 0 }, w: 0,
        verts: verts, normals: normals, count: verts.length,
        invMass: mass ? 1 / mass : 0,
        invI: inertia ? 1 / inertia : 0,
        sf: 0.5, df: 0.4,
        color: opts.color || '#888',
        isStatic: isStatic
      };
    }

    function worldVertex(b, i) {
      const r = rot(b.verts[i].x, b.verts[i].y, b.angle);
      return { x: b.pos.x + r.x, y: b.pos.y + r.y };
    }
    function worldNormal(b, i) {
      return rot(b.normals[i].x, b.normals[i].y, b.angle);
    }
    function getSupport(b, dx, dy) {
      let best = -Infinity, bestV = b.verts[0];
      for (let i = 0; i < b.count; i++) {
        const proj = b.verts[i].x * dx + b.verts[i].y * dy;
        if (proj > best) { best = proj; bestV = b.verts[i]; }
      }
      return bestV;
    }

    // ---------- Detekce kolizí (SAT pro mnohoúhelníky) ----------
    function findLeastPenetration(A, B) {
      let bestDist = -Infinity, bestIndex = 0;
      for (let i = 0; i < A.count; i++) {
        const nw = worldNormal(A, i);
        const nb = rot(nw.x, nw.y, -B.angle);
        const s = getSupport(B, -nb.x, -nb.y);
        const vw = worldVertex(A, i);
        const rel = rot(vw.x - B.pos.x, vw.y - B.pos.y, -B.angle);
        const d = nb.x * (s.x - rel.x) + nb.y * (s.y - rel.y);
        if (d > bestDist) { bestDist = d; bestIndex = i; }
      }
      return { dist: bestDist, index: bestIndex };
    }

    function incidentFace(ref, inc, refIndex) {
      const rn = worldNormal(ref, refIndex);
      const rnl = rot(rn.x, rn.y, -inc.angle);
      let minDot = Infinity, face = 0;
      for (let i = 0; i < inc.count; i++) {
        const d = rnl.x * inc.normals[i].x + rnl.y * inc.normals[i].y;
        if (d < minDot) { minDot = d; face = i; }
      }
      return [worldVertex(inc, face), worldVertex(inc, (face + 1) % inc.count)];
    }

    function clip(nx, ny, c, face) {
      let sp = 0;
      const out = [face[0], face[1]];
      const d1 = nx * face[0].x + ny * face[0].y - c;
      const d2 = nx * face[1].x + ny * face[1].y - c;
      if (d1 <= 0) out[sp++] = face[0];
      if (d2 <= 0) out[sp++] = face[1];
      if (d1 * d2 < 0) {
        const alpha = d1 / (d1 - d2);
        out[sp++] = {
          x: face[0].x + alpha * (face[1].x - face[0].x),
          y: face[0].y + alpha * (face[1].y - face[0].y)
        };
      }
      face[0] = out[0]; face[1] = out[1];
      return sp;
    }

    // Vrací manifold: normála (A->B) a kontaktní body s hloubkou.
    function collide(A, B) {
      const a = findLeastPenetration(A, B);
      if (a.dist >= 0) return null;
      const b = findLeastPenetration(B, A);
      if (b.dist >= 0) return null;

      let RefPoly, IncPoly, refIndex, flip;
      if (a.dist >= b.dist * 0.95 + a.dist * 0.01) {
        RefPoly = A; IncPoly = B; refIndex = a.index; flip = false;
      } else {
        RefPoly = B; IncPoly = A; refIndex = b.index; flip = true;
      }

      const inc = incidentFace(RefPoly, IncPoly, refIndex);
      const v1 = worldVertex(RefPoly, refIndex);
      const v2 = worldVertex(RefPoly, (refIndex + 1) % RefPoly.count);
      let sx = v2.x - v1.x, sy = v2.y - v1.y;
      const sl = Math.hypot(sx, sy); sx /= sl; sy /= sl;
      const rfnx = sy, rfny = -sx;
      const refC = rfnx * v1.x + rfny * v1.y;
      const negSide = -(sx * v1.x + sy * v1.y);
      const posSide = sx * v2.x + sy * v2.y;

      if (clip(-sx, -sy, negSide, inc) < 2) return null;
      if (clip(sx, sy, posSide, inc) < 2) return null;

      const nx = flip ? -rfnx : rfnx;
      const ny = flip ? -rfny : rfny;

      const points = [];
      for (let i = 0; i < 2; i++) {
        const sep = rfnx * inc[i].x + rfny * inc[i].y - refC;
        if (sep <= 0) points.push({ x: inc[i].x, y: inc[i].y, sep: sep });
      }
      if (!points.length) return null;
      return { A: A, B: B, nx: nx, ny: ny, points: points };
    }

    // ---------- Krok simulace ----------
    function applyImpulse(b, ix, iy, rx, ry) {
      if (b.isStatic) return;
      b.v.x += b.invMass * ix;
      b.v.y += b.invMass * iy;
      b.w += b.invI * (rx * iy - ry * ix);
    }

    function step(dt) {
      // integrace sil + mezní rychlost (tlumí tvrdé nárazy)
      for (const b of bodies) {
        if (b.isStatic) continue;
        b.v.y += GRAVITY * dt;
        if (b.v.y > VMAX) b.v.y = VMAX; else if (b.v.y < -VMAX) b.v.y = -VMAX;
        if (b.v.x > VMAX) b.v.x = VMAX; else if (b.v.x < -VMAX) b.v.x = -VMAX;
      }

      // detekce kolizí -> kontakty seskupené podle dvojice těles
      const byPair = new Map();
      for (let i = 0; i < bodies.length; i++) {
        for (let j = i + 1; j < bodies.length; j++) {
          const A = bodies[i], B = bodies[j];
          if (A.isStatic && B.isStatic) continue;
          const m = collide(A, B);
          if (!m) continue;
          const key = A.id < B.id ? A.id + '_' + B.id : B.id + '_' + A.id;
          const arr = [];
          for (const p of m.points) {
            arr.push({ A: A, B: B, nx: m.nx, ny: m.ny, px: p.x, py: p.y, sep: p.sep, Pn: 0, Pt: 0 });
          }
          byPair.set(key, arr);
        }
      }

      // příprava kontaktů + warm starting (převzetí impulzů z minulého snímku)
      const contacts = [];
      for (const entry of byPair) {
        const key = entry[0], C = entry[1];
        const prev = cache.get(key);
        for (const c of C) {
          if (prev) {
            let best = 196, bp = null; // 14^2 px
            for (const q of prev) {
              const d = (q.x - c.px) * (q.x - c.px) + (q.y - c.py) * (q.y - c.py);
              if (d < best) { best = d; bp = q; }
            }
            if (bp) { c.Pn = bp.Pn; c.Pt = bp.Pt; }
          } else {
            // nový kontakt – odhad rychlosti dopadu pro zvuk nárazu
            const approach = -((c.B.v.x - c.A.v.x) * c.nx + (c.B.v.y - c.A.v.y) * c.ny);
            if (approach > pendingImpact) pendingImpact = approach;
          }
          const ra = [c.px - c.A.pos.x, c.py - c.A.pos.y];
          const rb = [c.px - c.B.pos.x, c.py - c.B.pos.y];
          c.ra = ra; c.rb = rb;
          const rnA = ra[0] * c.ny - ra[1] * c.nx, rnB = rb[0] * c.ny - rb[1] * c.nx;
          c.massN = 1 / (c.A.invMass + c.B.invMass + c.A.invI * rnA * rnA + c.B.invI * rnB * rnB);
          const tx = -c.ny, ty = c.nx;
          const rtA = ra[0] * ty - ra[1] * tx, rtB = rb[0] * ty - rb[1] * tx;
          c.massT = 1 / (c.A.invMass + c.B.invMass + c.A.invI * rtA * rtA + c.B.invI * rtB * rtB);
          c.tx = tx; c.ty = ty;
          c.bias = BETA / dt * Math.max(0, -c.sep - SLOP);
          c.fric = Math.sqrt(c.A.sf * c.B.sf);
          // aplikuj uložený impulz na začátku (warm start)
          const ix = c.Pn * c.nx + c.Pt * c.tx, iy = c.Pn * c.ny + c.Pt * c.ty;
          applyImpulse(c.A, -ix, -iy, ra[0], ra[1]);
          applyImpulse(c.B, ix, iy, rb[0], rb[1]);
          contacts.push(c);
        }
      }

      // řešení rychlostí – akumulované impulzy
      for (let it = 0; it < ITER; it++) {
        for (const c of contacts) {
          const A = c.A, B = c.B, ra = c.ra, rb = c.rb;
          // normála
          let rvx = B.v.x - B.w * rb[1] - (A.v.x - A.w * ra[1]);
          let rvy = B.v.y + B.w * rb[0] - (A.v.y + A.w * ra[0]);
          let vn = rvx * c.nx + rvy * c.ny;
          let dPn = c.massN * (-vn + c.bias);
          const Pn0 = c.Pn; c.Pn = Math.max(Pn0 + dPn, 0); dPn = c.Pn - Pn0;
          let ix = dPn * c.nx, iy = dPn * c.ny;
          applyImpulse(A, -ix, -iy, ra[0], ra[1]);
          applyImpulse(B, ix, iy, rb[0], rb[1]);
          // tření
          rvx = B.v.x - B.w * rb[1] - (A.v.x - A.w * ra[1]);
          rvy = B.v.y + B.w * rb[0] - (A.v.y + A.w * ra[0]);
          let vt = rvx * c.tx + rvy * c.ty;
          let dPt = c.massT * (-vt);
          const maxPt = c.fric * c.Pn;
          const Pt0 = c.Pt; c.Pt = Math.max(-maxPt, Math.min(maxPt, Pt0 + dPt)); dPt = c.Pt - Pt0;
          ix = dPt * c.tx; iy = dPt * c.ty;
          applyImpulse(A, -ix, -iy, ra[0], ra[1]);
          applyImpulse(B, ix, iy, rb[0], rb[1]);
        }
      }

      // integrace pozic
      for (const b of bodies) {
        if (b.isStatic) continue;
        b.pos.x += b.v.x * dt;
        b.pos.y += b.v.y * dt;
        b.angle += b.w * dt;
      }

      // ulož impulzy pro warm starting příštího snímku
      cache.clear();
      for (const entry of byPair) {
        cache.set(entry[0], entry[1].map(function (c) {
          return { x: c.px, y: c.py, Pn: c.Pn, Pt: c.Pt };
        }));
      }
    }

    // ---------- Svět ----------
    function floorY() { return H - 20; }

    function rebuildStatics() {
      statics = [
        makeBox(W / 2, floorY() + 400, W, 400, { isStatic: true }),   // podlaha
        makeBox(-200, H / 2, 200, H * 2, { isStatic: true }),         // levá stěna
        makeBox(W + 200, H / 2, 200, H * 2, { isStatic: true })       // pravá stěna
      ];
      bodies = statics.concat(bodies.filter(function (b) { return !b.isStatic; }));
    }

    function addBlock(x) {
      const half = BLOCK_W / 2;
      x = Math.max(half + 2, Math.min(W - half - 2, x));
      const dyn = bodies.filter(function (o) { return !o.isStatic; }).length;
      const b = makeBox(x, -BLOCK_H, BLOCK_W / 2, BLOCK_H / 2, {
        color: COLORS[dyn % COLORS.length],
        angle: (Math.random() - 0.5) * 0.06   // nepatrné natočení – přirozenější stoh
      });
      bodies.push(b);
      Sound.place();
      updateScore();
    }

    // ---------- Ničení kostek ----------
    function blockAt(px, py) {
      // projdi od vrchu (poslední přidané) – vrať dynamickou kostku pod bodem
      for (let i = bodies.length - 1; i >= 0; i--) {
        const b = bodies[i];
        if (b.isStatic) continue;
        const local = rot(px - b.pos.x, py - b.pos.y, -b.angle);
        const hw = b.verts[1].x, hh = b.verts[2].y;
        if (Math.abs(local.x) <= hw && Math.abs(local.y) <= hh) return b;
      }
      return null;
    }

    function destroyBlock(b) {
      const idx = bodies.indexOf(b);
      if (idx === -1) return;
      bodies.splice(idx, 1);
      // zruš uložené impulzy, kterých se kostka účastnila
      for (const key of Array.from(cache.keys())) {
        const parts = key.split('_');
        if (parts[0] == b.id || parts[1] == b.id) cache.delete(key);
      }
      spawnPop(b.pos.x, b.pos.y, b.color);
      Sound.destroy();
      updateScore();
    }

    // efekt "rozprsknutí" při zničení
    const pops = [];
    function spawnPop(x, y, color) {
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 80 + Math.random() * 220;
        pops.push({
          x: x, y: y,
          vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60,
          life: 1, color: color, r: 2 + Math.random() * 4
        });
      }
    }
    function updatePops(dt) {
      for (let i = pops.length - 1; i >= 0; i--) {
        const p = pops[i];
        p.vy += GRAVITY * 0.6 * dt;
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.life -= dt * 1.6;
        if (p.life <= 0) pops.splice(i, 1);
      }
    }

    function updateScore() {
      let top = floorY(), count = 0;
      for (const b of bodies) {
        if (b.isStatic) continue;
        count++;
        for (let i = 0; i < b.count; i++) {
          const v = worldVertex(b, i);
          if (v.y < top) top = v.y;
        }
      }
      const height = Math.max(0, Math.round((floorY() - top) / BLOCK_H));
      scoreEl.innerHTML = 'Kostky: ' + count + ' &middot; Výška: ' + height;
    }

    // ---------- Render ----------
    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(0, floorY(), W, H - floorY());

      for (const b of bodies) {
        if (b.isStatic) continue;
        ctx.save();
        ctx.translate(b.pos.x, b.pos.y);
        ctx.rotate(b.angle);
        const w = b.verts[1].x - b.verts[0].x;
        const h = b.verts[2].y - b.verts[1].y;
        const x = -w / 2, y = -h / 2;
        ctx.fillStyle = b.color;
        roundRect(x, y, w, h, 6); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        roundRect(x + 4, y + 4, w - 8, 8, 4); ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.28)';
        ctx.lineWidth = 1;
        roundRect(x, y, w, h, 6); ctx.stroke();
        ctx.restore();
      }

      // částice z ničení
      for (const p of pops) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    // ---------- Smyčka s pevným krokem ----------
    let last = performance.now();
    let acc = 0;
    function loop(now) {
      let frame = (now - last) / 1000;
      last = now;
      if (frame > 0.1) frame = 0.1;
      acc += frame;
      let steps = 0;
      pendingImpact = 0;
      while (acc >= STEP && steps < 8) { step(STEP); acc -= STEP; steps++; }
      if (pendingImpact > 200) Sound.impact(pendingImpact);
      updatePops(Math.min(frame, 0.05));
      draw();
      updateScore();
      requestAnimationFrame(loop);
    }

    // ---------- Vstup ----------
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth;
      H = canvas.clientHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      rebuildStatics();
    }
    window.addEventListener('resize', resize);

    let destroyMode = false;
    const modeBtn = document.getElementById('mode');
    const hint = document.getElementById('hint');
    function setMode(destroy) {
      destroyMode = destroy;
      modeBtn.classList.toggle('destroy', destroy);
      modeBtn.textContent = destroy ? '💥 Ničit' : '🧱 Stavět';
      hint.textContent = destroy
        ? 'Klepni na kostku a znič ji (pravé tlačítko ničí vždy)'
        : 'Klepni nebo klikni a umísti kostku';
    }
    modeBtn.addEventListener('click', function () { setMode(!destroyMode); });

    const soundBtn = document.getElementById('sound');
    soundBtn.addEventListener('click', function () {
      const on = Sound.toggle();
      soundBtn.textContent = on ? '🔊 Zvuk' : '🔇 Ticho';
      soundBtn.classList.toggle('off', !on);
    });

    canvas.addEventListener('pointerdown', function (e) {
      const rect = canvas.getBoundingClientRect();
      const px = e.clientX - rect.left, py = e.clientY - rect.top;
      // pravé tlačítko (nebo režim ničení) maže kostku pod kurzorem
      if (destroyMode || e.button === 2) {
        const b = blockAt(px, py);
        if (b) destroyBlock(b);
      } else {
        addBlock(px);
      }
    });
    // pravé tlačítko nemá vyvolávat kontextové menu
    canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });

    document.getElementById('reset').addEventListener('click', function () {
      bodies = statics.slice();
      cache.clear();
      pops.length = 0;
      updateScore();
    });

    resize();
    updateScore();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
