name: Provision Pxplore high score storage

# Jednorázové založení free JSON úložiště na jsonblob.com pro globální
# žebříček Pxplore (bez registrace a e-mailu). Spouští se ručně; pokud už
# config obsahuje funkční URL, jen ji otestuje. Vzniklou URL commitne do
# pxplore/hiscore-config.js.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create jsonblob storage and commit its URL
        run: |
          set -uo pipefail
          # self-test úložiště: PUT, GET, a vyčištění zpět na prázdný objekt
          test_blob() {
            U="$1"
            P=$(curl -sS -m 20 -o /dev/null -w '%{http_code}' -X PUT "$U" -H 'Content-Type: application/json' -d '{"selftest":{"n":"t","s":0,"t":0}}' || true)
            echo "blob: PUT -> HTTP $P"
            [ "$P" = "200" ] || return 1
            G=$(curl -sS -m 20 -w '|%{http_code}' "$U" || true)
            echo "blob: GET -> $G"
            case "$G" in *'"selftest"'*'|200') ;; *) return 1 ;; esac
            curl -sS -m 20 -o /dev/null -X PUT "$U" -H 'Content-Type: application/json' -d '{}' || true
            return 0
          }
          CURRENT=$(grep -o "https://jsonblob.com/api/jsonBlob/[A-Za-z0-9-]*" pxplore/hiscore-config.js || true)
          if [ -n "$CURRENT" ]; then
            echo "Config už obsahuje $CURRENT, spouštím jen self-test."
            if test_blob "$CURRENT"; then echo "Self-test OK."; exit 0; fi
            echo "Stávající úložiště nefunguje, zakládám nové."
          fi
          LOC=$(curl -sS -m 20 -D - -o /dev/null -X POST https://jsonblob.com/api/jsonBlob -H 'Content-Type: application/json' -d '{}' | tr -d '\r' | awk 'tolower($1)=="location:"{print $2}')
          echo "Location: $LOC"
          case "$LOC" in
            http*) URL="$LOC" ;;
            /*) URL="https://jsonblob.com$LOC" ;;
            *) echo "Úložiště se nepodařilo založit."; exit 1 ;;
          esac
          if ! test_blob "$URL"; then
            echo "Self-test nového úložiště selhal."
            exit 1
          fi
          {
            echo "// URL globálního žebříčku (jsonblob.com) – vygenerováno workflow provision-hiscore."
            echo "// Hra funguje i bez ní; postup hráče je vždy primárně v jeho zařízení."
            echo "window.PXPLORE_HISCORE_URL = '${URL}';"
          } > pxplore/hiscore-config.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pxplore/hiscore-config.js
          git commit -m "Pxplore: nastavit URL globálního žebříčku"
          git push
