name: Build APK and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        working-directory: hello-world-android
        run: gradle :app:assembleDebug

      - name: Prepare site directory
        run: |
          mkdir -p _site/downloads
          rsync -a \
            --exclude='hello-world-android' \
            --exclude='.github' \
            --exclude='.git' \
            --exclude='_site' \
            --exclude='CLAUDE.md' \
            . _site/
          cp hello-world-android/app/build/outputs/apk/debug/app-debug.apk \
             _site/downloads/hello-world.apk

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
